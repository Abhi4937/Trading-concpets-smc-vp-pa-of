<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 420" font-family="Segoe UI,Arial,sans-serif">
<rect width="860" height="420" rx="12" fill="#131722"/>
<text x="26" y="30" fill="#d1d4dc" font-size="19" font-weight="700">Daily Loss Governor</text>
<text x="26" y="49" fill="#787b86" font-size="12.5">Hard rules that stop you trading before a bad day becomes a blown account</text>
<rect x="26.0" y="92.0" width="808.0" height="46.0" rx="8" fill="#1a2230" stroke="#1b2230" stroke-width="1"/>
<rect x="26.0" y="92.0" width="6" height="46.0" rx="3" fill="#f23645"/>
<text x="44.0" y="119.0" fill="#f23645" font-size="12.5" font-weight="700">Max losses / day</text>
<text x="276.0" y="119.0" fill="#d1d4dc" font-size="11.5">2–3 losing trades → STOP for the day.</text>
<rect x="26.0" y="148.0" width="808.0" height="46.0" rx="8" fill="#1a2230" stroke="#1b2230" stroke-width="1"/>
<rect x="26.0" y="148.0" width="6" height="46.0" rx="3" fill="#f23645"/>
<text x="44.0" y="175.0" fill="#f23645" font-size="12.5" font-weight="700">Max ₹ loss / day</text>
<text x="276.0" y="175.0" fill="#d1d4dc" font-size="11.5">Down ~3% of capital → STOP, no exceptions.</text>
<rect x="26.0" y="204.0" width="808.0" height="46.0" rx="8" fill="#1a2230" stroke="#1b2230" stroke-width="1"/>
<rect x="26.0" y="204.0" width="6" height="46.0" rx="3" fill="#f0b90b"/>
<text x="44.0" y="231.0" fill="#f0b90b" font-size="12.5" font-weight="700">Max trades / day</text>
<text x="276.0" y="231.0" fill="#d1d4dc" font-size="11.5">Cap at ~3–5 quality setups; overtrading = revenge risk.</text>
<rect x="26.0" y="260.0" width="808.0" height="46.0" rx="8" fill="#1a2230" stroke="#1b2230" stroke-width="1"/>
<rect x="26.0" y="260.0" width="6" height="46.0" rx="3" fill="#089981"/>
<text x="44.0" y="287.0" fill="#089981" font-size="12.5" font-weight="700">Win lock-in</text>
<text x="276.0" y="287.0" fill="#d1d4dc" font-size="11.5">After a strong green day, bank it — don't give it back.</text>
<rect x="26.0" y="316.0" width="808.0" height="46.0" rx="8" fill="#1a2230" stroke="#1b2230" stroke-width="1"/>
<rect x="26.0" y="316.0" width="6" height="46.0" rx="3" fill="#9c27b0"/>
<text x="44.0" y="343.0" fill="#9c27b0" font-size="12.5" font-weight="700">Capital-stress note</text>
<text x="276.0" y="343.0" fill="#d1d4dc" font-size="11.5">If sizing feels heavy or emotional, you're too big — cut size.</text>
<text x="430.0" y="408" fill="#f0b90b" font-size="11.5" font-weight="600" text-anchor="middle">The governor is non-negotiable: survival first, profits second. Stop means stop.</text>
</svg>