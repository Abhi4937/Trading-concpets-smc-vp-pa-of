<text x="26" y="49" fill="#787b86" font-size="12.5">Option-premium stop ≈ futures stop (points) × option delta</text>
<rect x="36.0" y="80.0" width="788.0" height="56.0" rx="8" fill="#1d2330" stroke="#f0b90b" stroke-width="1.4"/>
