<text x="52.0" y="204.0" fill="#d1d4dc" font-size="15" font-weight="700">40 pt</text>
<text x="296.0" y="196.0" fill="#787b86" font-size="11">Nifty structural stop below the reclaimed level + ATR buffer.</text>
