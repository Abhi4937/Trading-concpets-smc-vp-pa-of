<text x="296.0" y="328.0" fill="#787b86" font-size="11">If the option was bought at 120, exit ≈ 100.</text>
<text x="430.0" y="408" fill="#f0b90b" font-size="11.5" font-weight="600" text-anchor="middle">Always VERIFY delta on the option chain — it drifts as price and time move.</text>
