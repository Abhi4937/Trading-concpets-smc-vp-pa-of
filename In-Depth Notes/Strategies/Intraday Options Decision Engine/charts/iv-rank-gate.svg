<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 420" font-family="Segoe UI,Arial,sans-serif">
<rect width="860" height="420" rx="12" fill="#131722"/>
<text x="26" y="30" fill="#d1d4dc" font-size="19" font-weight="700">IV-Rank Gate — buy or spread?</text>
<text x="26" y="49" fill="#787b86" font-size="12.5">IV rank decides whether buying options is cheap or whether to prefer spreads</text>
<defs><linearGradient id="ivg" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#089981"/><stop offset="0.5" stop-color="#f0b90b"/><stop offset="1" stop-color="#f23645"/></linearGradient></defs>
<rect x="46.0" y="110.0" width="768.0" height="40.0" rx="8" fill="url(#ivg)" opacity="0.85"/>
<text x="46.0" y="102.0" fill="#787b86" font-size="11">IV rank 0</text>
<text x="814.0" y="102.0" fill="#787b86" font-size="11" text-anchor="end">IV rank 100</text>
<rect x="26.0" y="174.0" width="258.7" height="150.0" rx="8" fill="#161d2b" stroke="#089981" stroke-width="1.4"/>
<text x="38.0" y="198.0" fill="#089981" font-size="12.5" font-weight="700">LOW IV (rank &lt; 30)</text>
<text x="38.0" y="220.0" fill="#787b86" font-size="10.5">Options are cheap → BUYING is</text>
<text x="38.0" y="233.5" fill="#787b86" font-size="10.5">OK. Long calls/puts, debit</text>
<text x="38.0" y="247.0" fill="#787b86" font-size="10.5">structures. Favourable for</text>
<text x="38.0" y="260.5" fill="#787b86" font-size="10.5">directional bets.</text>
<rect x="300.7" y="174.0" width="258.7" height="150.0" rx="8" fill="#161d2b" stroke="#f0b90b" stroke-width="1.4"/>
<text x="312.7" y="198.0" fill="#f0b90b" font-size="12.5" font-weight="700">MID IV (30–60)</text>
<text x="312.7" y="220.0" fill="#787b86" font-size="10.5">Neutral → size normally; lean to</text>
<text x="312.7" y="233.5" fill="#787b86" font-size="10.5">spreads if a move is expected to</text>
<text x="312.7" y="247.0" fill="#787b86" font-size="10.5">be slow.</text>
<rect x="575.3" y="174.0" width="258.7" height="150.0" rx="8" fill="#161d2b" stroke="#f23645" stroke-width="1.4"/>
<text x="587.3" y="198.0" fill="#f23645" font-size="12.5" font-weight="700">HIGH IV (rank &gt; 60)</text>
<text x="587.3" y="220.0" fill="#787b86" font-size="10.5">Options are expensive → AVOID</text>
<text x="587.3" y="233.5" fill="#787b86" font-size="10.5">naked buying. Prefer SPREADS /</text>
<text x="587.3" y="247.0" fill="#787b86" font-size="10.5">credit to offset IV crush.</text>
<text x="430.0" y="408" fill="#787b86" font-size="11.5" text-anchor="middle">High IV punishes option buyers via crush — when IV is rich, structure the trade as a spread.</text>
</svg>