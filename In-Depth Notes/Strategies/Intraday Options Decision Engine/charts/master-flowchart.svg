<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 600" font-family="Segoe UI,Arial,sans-serif">
<rect width="860" height="600" rx="12" fill="#131722"/>
<text x="26" y="30" fill="#d1d4dc" font-size="19" font-weight="700">The Intraday Decision Engine</text>
<text x="26" y="49" fill="#787b86" font-size="12.5">Pre-open map → read open → at-level fork → pick play → LTF trigger → option + stop gate</text>
<defs><marker id="mfar" markerWidth="9" markerHeight="9" refX="6" refY="4.5" orient="auto"><path d="M0,0 L9,4.5 L0,9 z" fill="#787b86"/></marker></defs>
<rect x="150.0" y="72.0" width="560.0" height="66.0" rx="8" fill="#161d2b" stroke="#2962ff" stroke-width="1.4"/>
<text x="166.0" y="96.0" fill="#2962ff" font-size="13.5" font-weight="700">① PRE-OPEN: map the levels</text>
<text x="166.0" y="114.0" fill="#787b86" font-size="10.5">Mark only 4–6 qualified levels — fresh OB/FVG, swing H/L, PDH/PDL, liquidity pools,</text>
<text x="166.0" y="127.5" fill="#787b86" font-size="10.5">OI walls.</text>
<path d="M430.0,138.0 L430.0,156.0" stroke="#787b86" stroke-width="1.8" marker-end="url(#mfar)"/>
<rect x="150.0" y="158.0" width="560.0" height="66.0" rx="8" fill="#161d2b" stroke="#26c6da" stroke-width="1.4"/>
<text x="166.0" y="182.0" fill="#26c6da" font-size="13.5" font-weight="700">② READ THE OPEN + REGIME</text>
<text x="166.0" y="200.0" fill="#787b86" font-size="10.5">Gap-up / gap-down / flat · balance vs trend · GEX/PCR/max-pain · news gate. Sets</text>
<text x="166.0" y="213.5" fill="#787b86" font-size="10.5">fade-vs-break bias.</text>
<path d="M430.0,224.0 L430.0,242.0" stroke="#787b86" stroke-width="1.8" marker-end="url(#mfar)"/>
<rect x="150.0" y="244.0" width="560.0" height="66.0" rx="8" fill="#161d2b" stroke="#f0b90b" stroke-width="1.4"/>
<text x="166.0" y="268.0" fill="#f0b90b" font-size="13.5" font-weight="700">③ AT THE LEVEL — the fork</text>
<text x="166.0" y="286.0" fill="#787b86" font-size="10.5">HOLD (reject → fade) · BREAK (close through → go) · WAIT (inside/unclear → no</text>
<text x="166.0" y="299.5" fill="#787b86" font-size="10.5">trade).</text>
<path d="M430.0,310.0 L430.0,328.0" stroke="#787b86" stroke-width="1.8" marker-end="url(#mfar)"/>
<rect x="150.0" y="330.0" width="560.0" height="66.0" rx="8" fill="#161d2b" stroke="#9c27b0" stroke-width="1.4"/>
<text x="166.0" y="354.0" fill="#9c27b0" font-size="13.5" font-weight="700">④ PICK THE PLAY</text>
<text x="166.0" y="372.0" fill="#787b86" font-size="10.5">breakout · fakeout · reversal · pullback · continuation — chosen by the fork +</text>
<text x="166.0" y="385.5" fill="#787b86" font-size="10.5">regime.</text>
<path d="M430.0,396.0 L430.0,414.0" stroke="#787b86" stroke-width="1.8" marker-end="url(#mfar)"/>
<rect x="150.0" y="416.0" width="560.0" height="66.0" rx="8" fill="#161d2b" stroke="#089981" stroke-width="1.4"/>
<text x="166.0" y="440.0" fill="#089981" font-size="13.5" font-weight="700">⑤ LTF TRIGGER</text>
<text x="166.0" y="458.0" fill="#787b86" font-size="10.5">5m conviction close / sweep-&amp;-go / retest of level·OB·FVG·VWAP with +delta. This is</text>
<text x="166.0" y="471.5" fill="#787b86" font-size="10.5">WHEN.</text>
<path d="M430.0,482.0 L430.0,500.0" stroke="#787b86" stroke-width="1.8" marker-end="url(#mfar)"/>
<rect x="150.0" y="502.0" width="560.0" height="66.0" rx="8" fill="#161d2b" stroke="#f0b90b" stroke-width="1.4"/>
<text x="166.0" y="526.0" fill="#f0b90b" font-size="13.5" font-weight="700">⑥ OPTION STRIKE + STOP-BUDGET GATE</text>
<text x="166.0" y="544.0" fill="#787b86" font-size="10.5">Strike (ATM/1-OTM) · option-SL ≈ points×delta or ATR · per-instrument budget · R:R ≥</text>
<text x="166.0" y="557.5" fill="#787b86" font-size="10.5">2 · IV gate.</text>
<text x="430.0" y="588" fill="#787b86" font-size="11.5" text-anchor="middle">Top-down funnel: each gate must pass before you risk premium. Fail any gate → stand aside.</text>
</svg>