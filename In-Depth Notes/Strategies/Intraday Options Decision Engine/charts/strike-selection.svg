<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 420" font-family="Segoe UI,Arial,sans-serif">
<rect width="860" height="420" rx="12" fill="#131722"/>
<text x="26" y="30" fill="#d1d4dc" font-size="19" font-weight="700">Strike Selection — ATM vs 1-OTM</text>
<text x="26" y="49" fill="#787b86" font-size="12.5">The trade-off: delta (responsiveness) vs premium (cost) vs theta (decay) vs breakeven</text>
<rect x="36.0" y="86.0" width="788.0" height="40.0" rx="6" fill="#1d2330"/>
<text x="167.3" y="112.0" fill="#d1d4dc" font-size="13.5" font-weight="700" text-anchor="middle"></text>
<text x="430.0" y="112.0" fill="#2962ff" font-size="13.5" font-weight="700" text-anchor="middle">ATM</text>
<text x="692.7" y="112.0" fill="#f0b90b" font-size="13.5" font-weight="700" text-anchor="middle">1-OTM</text>
<rect x="36.0" y="126.0" width="788.0" height="40.0" fill="#161d2b"/>
<text x="50.0" y="152.0" fill="#d1d4dc" font-size="11.5" font-weight="600">Delta</text>
<text x="430.0" y="152.0" fill="#d1d4dc" font-size="11" text-anchor="middle">~0.50</text>
<text x="692.7" y="152.0" fill="#d1d4dc" font-size="11" text-anchor="middle">~0.35  (lower)</text>
<rect x="36.0" y="166.0" width="788.0" height="40.0" fill="#11161f"/>
<text x="50.0" y="192.0" fill="#d1d4dc" font-size="11.5" font-weight="600">Premium</text>
<text x="430.0" y="192.0" fill="#d1d4dc" font-size="11" text-anchor="middle">Higher (₹ cost)</text>
<text x="692.7" y="192.0" fill="#d1d4dc" font-size="11" text-anchor="middle">Lower (cheaper)</text>
<rect x="36.0" y="206.0" width="788.0" height="40.0" fill="#161d2b"/>
<text x="50.0" y="232.0" fill="#d1d4dc" font-size="11.5" font-weight="600">Theta decay</text>
<text x="430.0" y="232.0" fill="#d1d4dc" font-size="11" text-anchor="middle">Moderate</text>
<text x="692.7" y="232.0" fill="#d1d4dc" font-size="11" text-anchor="middle">Faster (% of premium)</text>
<rect x="36.0" y="246.0" width="788.0" height="40.0" fill="#11161f"/>
<text x="50.0" y="272.0" fill="#d1d4dc" font-size="11.5" font-weight="600">Breakeven</text>
<text x="430.0" y="272.0" fill="#d1d4dc" font-size="11" text-anchor="middle">Closer to spot</text>
<text x="692.7" y="272.0" fill="#d1d4dc" font-size="11" text-anchor="middle">Further — needs a bigger move</text>
<rect x="36.0" y="286.0" width="788.0" height="40.0" fill="#161d2b"/>
<text x="50.0" y="312.0" fill="#d1d4dc" font-size="11.5" font-weight="600">Best for</text>
<text x="430.0" y="312.0" fill="#d1d4dc" font-size="11" text-anchor="middle">Reliable, level-to-level moves</text>
<text x="692.7" y="312.0" fill="#d1d4dc" font-size="11" text-anchor="middle">Cheap directional punts / trends</text>
<rect x="36.0" y="86" width="788.0" height="240.0" rx="6" fill="none" stroke="#1b2230" stroke-width="1.2"/>
<line x1="298.7" y1="86" x2="298.7" y2="326.0" stroke="#1b2230" stroke-width="1"/>
<line x1="561.3" y1="86" x2="561.3" y2="326.0" stroke="#1b2230" stroke-width="1"/>
<text x="430.0" y="408" fill="#787b86" font-size="11.5" text-anchor="middle">ATM = pay more for responsiveness; 1-OTM = cheaper but needs a bigger, faster move.</text>
</svg>