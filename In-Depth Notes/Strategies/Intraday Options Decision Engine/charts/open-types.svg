<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 400" font-family="Segoe UI,Arial,sans-serif">
<rect width="860" height="400" rx="12" fill="#131722"/>
<text x="26" y="30" fill="#d1d4dc" font-size="19" font-weight="700">Open Types — how price travels to the level</text>
<text x="26" y="49" fill="#787b86" font-size="12.5">The open sets the first read: gap-up / gap-down / flat</text>
<rect x="34.0" y="82.0" width="252.0" height="200.0" rx="8" fill="#161d2b" stroke="#089981" stroke-width="1.4"/>
<text x="48.0" y="106.0" fill="#089981" font-size="14" font-weight="700">GAP-UP</text>
<path d="M48.0,172.6 L92.8,133.3 L137.6,138.0 L182.4,128.6 L227.2,134.9 L272.0,125.4" stroke="#089981" stroke-width="2.4" fill="none"/>
<line x1="48.0" y1="141.1" x2="272.0" y2="141.1" stroke="#787b86" stroke-width="1" stroke-dasharray="4 3"/>
<text x="48.0" y="200.0" fill="#787b86" font-size="10">Opens above value. Expect a pullback to</text>
<text x="48.0" y="213.0" fill="#787b86" font-size="10">fill the gap or test PDH; fade</text>
<text x="48.0" y="226.0" fill="#787b86" font-size="10">exhaustion, buy held retests.</text>
<rect x="304.0" y="82.0" width="252.0" height="200.0" rx="8" fill="#161d2b" stroke="#f23645" stroke-width="1.4"/>
<text x="318.0" y="106.0" fill="#f23645" font-size="14" font-weight="700">GAP-DOWN</text>
<path d="M318.0,125.4 L362.8,164.7 L407.6,160.0 L452.4,169.4 L497.2,163.1 L542.0,172.6" stroke="#f23645" stroke-width="2.4" fill="none"/>
<line x1="318.0" y1="156.9" x2="542.0" y2="156.9" stroke="#787b86" stroke-width="1" stroke-dasharray="4 3"/>
<text x="318.0" y="200.0" fill="#787b86" font-size="10">Opens below value. Watch for a bounce to</text>
<text x="318.0" y="213.0" fill="#787b86" font-size="10">fill / test PDL; sell failed reclaims,</text>
<text x="318.0" y="226.0" fill="#787b86" font-size="10">buy sweeps of lows.</text>
<rect x="574.0" y="82.0" width="252.0" height="200.0" rx="8" fill="#161d2b" stroke="#26c6da" stroke-width="1.4"/>
<text x="588.0" y="106.0" fill="#26c6da" font-size="14" font-weight="700">FLAT</text>
<path d="M588.0,149.0 L632.8,140.8 L677.6,157.2 L722.4,144.9 L767.2,153.1 L812.0,149.0" stroke="#26c6da" stroke-width="2.4" fill="none"/>
<line x1="588.0" y1="149.0" x2="812.0" y2="149.0" stroke="#787b86" stroke-width="1" stroke-dasharray="4 3"/>
<text x="588.0" y="200.0" fill="#787b86" font-size="10">Opens in value. Expect IB to build</text>
<text x="588.0" y="213.0" fill="#787b86" font-size="10">first; trade the edges of the opening</text>
<text x="588.0" y="226.0" fill="#787b86" font-size="10">range, not the middle.</text>
<text x="430.0" y="388" fill="#787b86" font-size="11.5" text-anchor="middle">The open tells you which levels are in play and whether to fade or follow first.</text>
</svg>