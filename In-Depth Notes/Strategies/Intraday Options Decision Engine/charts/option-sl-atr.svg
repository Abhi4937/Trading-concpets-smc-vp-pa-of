<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 420" font-family="Segoe UI,Arial,sans-serif">
<rect width="860" height="420" rx="12" fill="#131722"/>
<text x="26" y="30" fill="#d1d4dc" font-size="19" font-weight="700">Option / Futures SL via ATR</text>
<text x="26" y="49" fill="#787b86" font-size="12.5">Size the stop to volatility: stop (pts) = ATR × multiplier, then convert with delta</text>
<rect x="36.0" y="80.0" width="788.0" height="56.0" rx="8" fill="#1a2730" stroke="#26c6da" stroke-width="1.4"/>
<text x="430.0" y="115.0" fill="#26c6da" font-size="17" font-weight="700" text-anchor="middle">futures stop (pts)  =  ATR(14)  ×  multiplier (1.0–1.5)</text>
<rect x="36.0" y="160.0" width="788.0" height="48.0" rx="8" fill="#161d2b" stroke="#2962ff" stroke-width="1.4"/>
<text x="52.0" y="182.0" fill="#2962ff" font-size="12" font-weight="700">ATR(14) on 5m</text>
<text x="52.0" y="200.0" fill="#d1d4dc" font-size="14" font-weight="700">30 pt</text>
<text x="296.0" y="191.0" fill="#787b86" font-size="11">Current Nifty 5m ATR — the market's normal swing.</text>
<rect x="36.0" y="218.0" width="788.0" height="48.0" rx="8" fill="#161d2b" stroke="#26c6da" stroke-width="1.4"/>
<text x="52.0" y="240.0" fill="#26c6da" font-size="12" font-weight="700">Multiplier</text>
<text x="52.0" y="258.0" fill="#d1d4dc" font-size="14" font-weight="700">1.5×</text>
<text x="296.0" y="249.0" fill="#787b86" font-size="11">Give the stop room beyond noise (use 1.0–1.5 intraday).</text>
<rect x="36.0" y="276.0" width="788.0" height="48.0" rx="8" fill="#161d2b" stroke="#f0b90b" stroke-width="1.4"/>
<text x="52.0" y="298.0" fill="#f0b90b" font-size="12" font-weight="700">Futures stop</text>
<text x="52.0" y="316.0" fill="#d1d4dc" font-size="14" font-weight="700">30 × 1.5 ≈ 45 pt</text>
<text x="296.0" y="307.0" fill="#787b86" font-size="11">Place SL 45 pt beyond invalidation.</text>
<rect x="36.0" y="334.0" width="788.0" height="48.0" rx="8" fill="#161d2b" stroke="#089981" stroke-width="1.4"/>
<text x="52.0" y="356.0" fill="#089981" font-size="12" font-weight="700">Premium stop</text>
<text x="52.0" y="374.0" fill="#d1d4dc" font-size="14" font-weight="700">45 × 0.5 ≈ 22 pt</text>
<text x="296.0" y="365.0" fill="#787b86" font-size="11">Convert with delta for the option-premium stop.</text>
<text x="430.0" y="408" fill="#787b86" font-size="11.5" text-anchor="middle">ATR adapts the stop to the day's volatility — wider on volatile days, tighter on quiet ones.</text>
</svg>