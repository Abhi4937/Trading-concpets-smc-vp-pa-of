<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 566" font-family="Segoe UI,Arial,sans-serif">
<rect width="860" height="566" rx="12" fill="#131722"/>
<text x="26" y="30" fill="#d1d4dc" font-size="19" font-weight="700">Multi-Timeframe Nesting</text>
<text x="26" y="49" fill="#787b86" font-size="12.5">HTF decides DIRECTION · MTF decides WHERE · LTF decides WHEN</text>
<rect x="40" y="78" width="440" height="128" rx="8" fill="#161d2b" stroke="#2962ff" stroke-width="1.4"/>
<text x="54" y="102" fill="#2962ff" font-size="14" font-weight="700">1h — BIAS</text>
<path d="M54.0,184.1 L110.0,162.0 L166.0,166.5 L222.0,140.0 L278.0,145.8 L334.0,117.9" stroke="#2962ff" stroke-width="2.4" fill="none"/>
<text x="342" y="100" fill="#787b86" font-size="9.5">Trend (BOS), PDH/PDL,</text>
<text x="342" y="113" fill="#787b86" font-size="9.5">prior-day value &amp; naked</text>
<text x="342" y="126" fill="#787b86" font-size="9.5">POC, OI-wall band. →</text>
<text x="342" y="139" fill="#787b86" font-size="9.5">only trade in this</text>
<text x="342" y="152" fill="#787b86" font-size="9.5">direction.</text>
<path d="M260.0,206 L260.0,224" stroke="#787b86" stroke-width="1.6" marker-end="url(#mtfar)"/>
<rect x="40" y="228" width="440" height="128" rx="8" fill="#161d2b" stroke="#f0b90b" stroke-width="1.4"/>
<text x="54" y="252" fill="#f0b90b" font-size="14" font-weight="700">30m — THE LEVEL</text>
<path d="M54.0,323.3 L100.7,328.9 L147.3,320.5 L194.0,326.1 L240.7,317.7 L287.3,320.5 L334.0,273.1" stroke="#f0b90b" stroke-width="2.4" fill="none"/>
<line x1="54" y1="328.9" x2="334" y2="328.9" stroke="#f0b90b" stroke-width="1.2" stroke-dasharray="5 4"/>
<text x="342" y="250" fill="#787b86" font-size="9.5">Initial Balance / range</text>
<text x="342" y="263" fill="#787b86" font-size="9.5">to break, the liquidity</text>
<text x="342" y="276" fill="#787b86" font-size="9.5">pool (equal</text>
<text x="342" y="289" fill="#787b86" font-size="9.5">highs/lows), the OI</text>
<text x="342" y="302" fill="#787b86" font-size="9.5">walls.</text>
<path d="M260.0,356 L260.0,374" stroke="#787b86" stroke-width="1.6" marker-end="url(#mtfar)"/>
<rect x="40" y="378" width="440" height="128" rx="8" fill="#161d2b" stroke="#089981" stroke-width="1.4"/>
<text x="54" y="402" fill="#089981" font-size="14" font-weight="700">5m — THE TRIGGER</text>
<path d="M54.0,475.2 L89.0,468.9 L124.0,473.1 L159.0,481.6 L194.0,462.6 L229.0,464.7 L264.0,441.5 L299.0,445.7 L334.0,420.4" stroke="#089981" stroke-width="2.4" fill="none"/>
<line x1="54" y1="468.9" x2="334" y2="468.9" stroke="#f0b90b" stroke-width="1.2" stroke-dasharray="5 4"/>
<text x="342" y="400" fill="#787b86" font-size="9.5">Conviction close</text>
<text x="342" y="413" fill="#787b86" font-size="9.5">beyond, stacked</text>
<text x="342" y="426" fill="#787b86" font-size="9.5">imbalances / +delta,</text>
<text x="342" y="439" fill="#787b86" font-size="9.5">sweep-and-go vs</text>
<text x="342" y="452" fill="#787b86" font-size="9.5">sweep-and-reverse,</text>
<text x="342" y="465" fill="#787b86" font-size="9.5">retest of</text>
<text x="342" y="478" fill="#787b86" font-size="9.5">level/OB/VWAP.</text>
<defs><marker id="mtfar" markerWidth="9" markerHeight="9" refX="6" refY="4.5" orient="auto"><path d="M0,0 L9,4.5 L0,9 z" fill="#787b86"/></marker></defs>
<text x="510" y="96" fill="#d1d4dc" font-size="13" font-weight="700">The funnel</text>
<text x="510" y="116" fill="#2962ff" font-size="12" font-weight="700">Align?</text>
<text x="510" y="132" fill="#787b86" font-size="10">5m trigger must agree with 1h</text>
<text x="510" y="145" fill="#787b86" font-size="10">bias — else it is a</text>
<text x="510" y="158" fill="#787b86" font-size="10">counter-trend fade, not a</text>
<text x="510" y="171" fill="#787b86" font-size="10">trade.</text>
<text x="510" y="193" fill="#f0b90b" font-size="12" font-weight="700">Priority</text>
<text x="510" y="209" fill="#787b86" font-size="10">HTF FVG/OB outranks LTF. The</text>
<text x="510" y="222" fill="#787b86" font-size="10">level is set on 1h/30m; the 5m</text>
<text x="510" y="235" fill="#787b86" font-size="10">never invents one.</text>
<text x="510" y="257" fill="#089981" font-size="12" font-weight="700">Confirm</text>
<text x="510" y="273" fill="#787b86" font-size="10">Options layer (OI/IV/GEX) sets</text>
<text x="510" y="286" fill="#787b86" font-size="10">the environment; the 5m candle</text>
<text x="510" y="299" fill="#787b86" font-size="10">pulls the trigger.</text>
<text x="430.0" y="554" fill="#787b86" font-size="11.5" text-anchor="middle">One timeframe lies; three timeframes agreeing is conviction.</text>
</svg>