<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 380" font-family="Segoe UI,Arial,sans-serif">
<rect width="860" height="380" rx="12" fill="#131722"/>
<text x="26" y="30" fill="#d1d4dc" font-size="19" font-weight="700">The Five Plays</text>
<text x="26" y="49" fill="#787b86" font-size="12.5">Every intraday trade is one of these — pick by the fork + the regime</text>
<rect x="22.0" y="84.0" width="152.0" height="210.0" rx="8" fill="#161d2b" stroke="#089981" stroke-width="1.4"/>
<rect x="22.0" y="84.0" width="152.0" height="34" rx="8" fill="#089981" opacity="0.20"/>
<text x="98.0" y="107.0" fill="#089981" font-size="13.5" font-weight="700" text-anchor="middle">BREAKOUT</text>
<text x="34.0" y="142.0" fill="#d1d4dc" font-size="10.5" font-weight="600">When it applies</text>
<text x="34.0" y="160.0" fill="#787b86" font-size="10.5">Level BREAKS with a</text>
<text x="34.0" y="173.5" fill="#787b86" font-size="10.5">conviction close +</text>
<text x="34.0" y="187.0" fill="#787b86" font-size="10.5">volume → go with it.</text>
<rect x="188.0" y="84.0" width="152.0" height="210.0" rx="8" fill="#161d2b" stroke="#f23645" stroke-width="1.4"/>
<rect x="188.0" y="84.0" width="152.0" height="34" rx="8" fill="#f23645" opacity="0.20"/>
<text x="264.0" y="107.0" fill="#f23645" font-size="13.5" font-weight="700" text-anchor="middle">FAKEOUT</text>
<text x="200.0" y="142.0" fill="#d1d4dc" font-size="10.5" font-weight="600">When it applies</text>
<text x="200.0" y="160.0" fill="#787b86" font-size="10.5">Poke beyond, long</text>
<text x="200.0" y="173.5" fill="#787b86" font-size="10.5">wick, close back</text>
<text x="200.0" y="187.0" fill="#787b86" font-size="10.5">inside → fade the</text>
<text x="200.0" y="200.5" fill="#787b86" font-size="10.5">failed break.</text>
<rect x="354.0" y="84.0" width="152.0" height="210.0" rx="8" fill="#161d2b" stroke="#f0b90b" stroke-width="1.4"/>
<rect x="354.0" y="84.0" width="152.0" height="34" rx="8" fill="#f0b90b" opacity="0.20"/>
<text x="430.0" y="107.0" fill="#f0b90b" font-size="13.5" font-weight="700" text-anchor="middle">REVERSAL</text>
<text x="366.0" y="142.0" fill="#d1d4dc" font-size="10.5" font-weight="600">When it applies</text>
<text x="366.0" y="160.0" fill="#787b86" font-size="10.5">Sweep + reclaim at a</text>
<text x="366.0" y="173.5" fill="#787b86" font-size="10.5">level → turn against</text>
<text x="366.0" y="187.0" fill="#787b86" font-size="10.5">the prior move.</text>
<rect x="520.0" y="84.0" width="152.0" height="210.0" rx="8" fill="#161d2b" stroke="#2962ff" stroke-width="1.4"/>
<rect x="520.0" y="84.0" width="152.0" height="34" rx="8" fill="#2962ff" opacity="0.20"/>
<text x="596.0" y="107.0" fill="#2962ff" font-size="13.5" font-weight="700" text-anchor="middle">PULLBACK</text>
<text x="532.0" y="142.0" fill="#d1d4dc" font-size="10.5" font-weight="600">When it applies</text>
<text x="532.0" y="160.0" fill="#787b86" font-size="10.5">After a break,</text>
<text x="532.0" y="173.5" fill="#787b86" font-size="10.5">retest the reclaimed</text>
<text x="532.0" y="187.0" fill="#787b86" font-size="10.5">level → tight-stop</text>
<text x="532.0" y="200.5" fill="#787b86" font-size="10.5">continuation.</text>
<rect x="686.0" y="84.0" width="152.0" height="210.0" rx="8" fill="#161d2b" stroke="#26c6da" stroke-width="1.4"/>
<rect x="686.0" y="84.0" width="152.0" height="34" rx="8" fill="#26c6da" opacity="0.20"/>
<text x="762.0" y="107.0" fill="#26c6da" font-size="13.5" font-weight="700" text-anchor="middle">CONTINUATION</text>
<text x="698.0" y="142.0" fill="#d1d4dc" font-size="10.5" font-weight="600">When it applies</text>
<text x="698.0" y="160.0" fill="#787b86" font-size="10.5">Trend pauses</text>
<text x="698.0" y="173.5" fill="#787b86" font-size="10.5">(flag/IB), then</text>
<text x="698.0" y="187.0" fill="#787b86" font-size="10.5">resumes in the SAME</text>
<text x="698.0" y="200.5" fill="#787b86" font-size="10.5">direction.</text>
<text x="430.0" y="366" fill="#787b86" font-size="11.5" text-anchor="middle">Two go-with (breakout, continuation), three go-against / conditional (fakeout, reversal, pullback).</text>
</svg>