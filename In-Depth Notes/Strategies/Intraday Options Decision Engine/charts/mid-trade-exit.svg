<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 440" font-family="Segoe UI,Arial,sans-serif">
<rect width="860" height="440" rx="12" fill="#131722"/>
<text x="26" y="30" fill="#d1d4dc" font-size="19" font-weight="700">Mid-Trade Exit — leave before the SL</text>
<text x="26" y="49" fill="#787b86" font-size="12.5">Exit when the THESIS breaks, not only when the stop is hit</text>
<rect x="26.0" y="92.0" width="808.0" height="50.0" rx="8" fill="#1a2230" stroke="#1b2230" stroke-width="1"/>
<rect x="26.0" y="92.0" width="6" height="50.0" rx="3" fill="#f23645"/>
<text x="44.0" y="116.0" fill="#f23645" font-size="12.5" font-weight="700">Delta flips</text>
<text x="44.0" y="134.0" fill="#787b86" font-size="10.5">CVD turns against you / aggressive flow reverses — the order-flow thesis is gone.</text>
<rect x="26.0" y="152.0" width="808.0" height="50.0" rx="8" fill="#1a2230" stroke="#1b2230" stroke-width="1"/>
<rect x="26.0" y="152.0" width="6" height="50.0" rx="3" fill="#f23645"/>
<text x="44.0" y="176.0" fill="#f23645" font-size="12.5" font-weight="700">Level reclaims against you</text>
<text x="44.0" y="194.0" fill="#787b86" font-size="10.5">The broken level is reclaimed back / your reclaim fails — structure invalidated.</text>
<rect x="26.0" y="212.0" width="808.0" height="50.0" rx="8" fill="#1a2230" stroke="#1b2230" stroke-width="1"/>
<rect x="26.0" y="212.0" width="6" height="50.0" rx="3" fill="#f0b90b"/>
<text x="44.0" y="236.0" fill="#f0b90b" font-size="12.5" font-weight="700">Time stop</text>
<text x="44.0" y="254.0" fill="#787b86" font-size="10.5">Trade hasn't worked in N bars — dead trade ties up risk; release it.</text>
<rect x="26.0" y="272.0" width="808.0" height="50.0" rx="8" fill="#1a2230" stroke="#1b2230" stroke-width="1"/>
<rect x="26.0" y="272.0" width="6" height="50.0" rx="3" fill="#f0b90b"/>
<text x="44.0" y="296.0" fill="#f0b90b" font-size="12.5" font-weight="700">Theta bleed</text>
<text x="44.0" y="314.0" fill="#787b86" font-size="10.5">Premium decaying with no follow-through — especially late-day weeklies.</text>
<rect x="26.0" y="332.0" width="808.0" height="50.0" rx="8" fill="#1a2230" stroke="#1b2230" stroke-width="1"/>
<rect x="26.0" y="332.0" width="6" height="50.0" rx="3" fill="#9c27b0"/>
<text x="44.0" y="356.0" fill="#9c27b0" font-size="12.5" font-weight="700">Confluence collapses</text>
<text x="44.0" y="374.0" fill="#787b86" font-size="10.5">The reasons you entered (OB/FVG/regime) no longer hold.</text>
<text x="430.0" y="428" fill="#f0b90b" font-size="11.5" font-weight="600" text-anchor="middle">The SL is the worst-case exit. The best exit is the moment the reason to be in vanishes.</text>
</svg>