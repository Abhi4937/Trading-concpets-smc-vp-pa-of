<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 400" font-family="Segoe UI,Arial,sans-serif">
<rect width="860" height="400" rx="12" fill="#131722"/>
<text x="26" y="30" fill="#d1d4dc" font-size="19" font-weight="700">R:R + Lot Sizing</text>
<text x="26" y="49" fill="#787b86" font-size="12.5">Risk a fixed fraction; let R:R and the per-lot risk decide the lots</text>
<rect x="36.0" y="80.0" width="788.0" height="50.0" rx="8" fill="#161d2b" stroke="#2962ff" stroke-width="1.4"/>
<text x="430.0" y="110.0" fill="#2962ff" font-size="15" font-weight="700" text-anchor="middle">lots = (capital × risk%)  ÷  (premium-stop × lot size)</text>
<rect x="36.0" y="148.0" width="788.0" height="46.0" rx="8" fill="#11161f" stroke="#26c6da" stroke-width="1.4"/>
<text x="52.0" y="170.0" fill="#26c6da" font-size="12" font-weight="700">Capital / risk</text>
<text x="52.0" y="188.0" fill="#d1d4dc" font-size="12.5" font-weight="600">₹1,00,000 × 1% = ₹1,000 risk</text>
<text x="396.0" y="179.0" fill="#787b86" font-size="10.5">Never risk more than ~1% per trade.</text>
<rect x="36.0" y="204.0" width="788.0" height="46.0" rx="8" fill="#11161f" stroke="#f0b90b" stroke-width="1.4"/>
<text x="52.0" y="226.0" fill="#f0b90b" font-size="12" font-weight="700">Premium stop</text>
<text x="52.0" y="244.0" fill="#d1d4dc" font-size="12.5" font-weight="600">20 pt (from delta calc)</text>
<text x="396.0" y="235.0" fill="#787b86" font-size="10.5">Per-unit risk on the option.</text>
<rect x="36.0" y="260.0" width="788.0" height="46.0" rx="8" fill="#11161f" stroke="#9c27b0" stroke-width="1.4"/>
<text x="52.0" y="282.0" fill="#9c27b0" font-size="12" font-weight="700">Lot size</text>
<text x="52.0" y="300.0" fill="#d1d4dc" font-size="12.5" font-weight="600">Nifty = 75</text>
<text x="396.0" y="291.0" fill="#787b86" font-size="10.5">Risk per lot = 20 × 75 = ₹1,500.</text>
<rect x="36.0" y="316.0" width="788.0" height="46.0" rx="8" fill="#11161f" stroke="#089981" stroke-width="1.4"/>
<text x="52.0" y="338.0" fill="#089981" font-size="12" font-weight="700">Result</text>
<text x="52.0" y="356.0" fill="#d1d4dc" font-size="12.5" font-weight="600">₹1,000 ÷ ₹1,500 ≈ 0 → take 1 lot only</text>
<text x="396.0" y="347.0" fill="#787b86" font-size="10.5">Capital-constrained: 1 lot, or widen capital.</text>
<text x="430.0" y="388" fill="#787b86" font-size="11.5" text-anchor="middle">With small capital, lot indivisibility forces 1 lot — only A+ setups justify the fixed-lot risk.</text>
</svg>