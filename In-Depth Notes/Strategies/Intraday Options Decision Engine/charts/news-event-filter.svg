<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 460" font-family="Segoe UI,Arial,sans-serif">
<rect width="860" height="460" rx="12" fill="#131722"/>
<text x="26" y="30" fill="#d1d4dc" font-size="19" font-weight="700">News / Event Filter — pre-market go/no-go</text>
<text x="26" y="49" fill="#787b86" font-size="12.5">Run the gate BEFORE the open; high-impact events change the rules of the day</text>
<rect x="26.0" y="86.0" width="808.0" height="42.0" rx="8" fill="#1a2230" stroke="#1b2230" stroke-width="1"/>
<rect x="26.0" y="86.0" width="6" height="42.0" rx="3" fill="#f23645"/>
<text x="44.0" y="112.0" fill="#f23645" font-size="12.5" font-weight="700">RBI policy / MPC</text>
<text x="276.0" y="112.0" fill="#d1d4dc" font-size="11.5">STAND ASIDE around the release; whipsaw risk is extreme.</text>
<rect x="26.0" y="136.0" width="808.0" height="42.0" rx="8" fill="#1a2230" stroke="#1b2230" stroke-width="1"/>
<rect x="26.0" y="136.0" width="6" height="42.0" rx="3" fill="#f23645"/>
<text x="44.0" y="162.0" fill="#f23645" font-size="12.5" font-weight="700">Fed / FOMC, US CPI</text>
<text x="276.0" y="162.0" fill="#d1d4dc" font-size="11.5">STAND ASIDE near the print; gaps + violent reversals.</text>
<rect x="26.0" y="186.0" width="808.0" height="42.0" rx="8" fill="#1a2230" stroke="#1b2230" stroke-width="1"/>
<rect x="26.0" y="186.0" width="6" height="42.0" rx="3" fill="#f0b90b"/>
<text x="44.0" y="212.0" fill="#f0b90b" font-size="12.5" font-weight="700">Results / earnings (stock)</text>
<text x="276.0" y="212.0" fill="#d1d4dc" font-size="11.5">WAIT for the first move to settle; avoid the gap candle.</text>
<rect x="26.0" y="236.0" width="808.0" height="42.0" rx="8" fill="#1a2230" stroke="#1b2230" stroke-width="1"/>
<rect x="26.0" y="236.0" width="6" height="42.0" rx="3" fill="#f0b90b"/>
<text x="44.0" y="262.0" fill="#f0b90b" font-size="12.5" font-weight="700">Expiry day</text>
<text x="276.0" y="262.0" fill="#d1d4dc" font-size="11.5">TRADE smaller; pinning + theta crush distort levels late-day.</text>
<rect x="26.0" y="286.0" width="808.0" height="42.0" rx="8" fill="#1a2230" stroke="#1b2230" stroke-width="1"/>
<rect x="26.0" y="286.0" width="6" height="42.0" rx="3" fill="#f0b90b"/>
<text x="44.0" y="312.0" fill="#f0b90b" font-size="12.5" font-weight="700">First 15 min (9:15–9:30)</text>
<text x="276.0" y="312.0" fill="#d1d4dc" font-size="11.5">WAIT — let the IB form; do not trade the auction noise.</text>
<rect x="26.0" y="336.0" width="808.0" height="42.0" rx="8" fill="#1a2230" stroke="#1b2230" stroke-width="1"/>
<rect x="26.0" y="336.0" width="6" height="42.0" rx="3" fill="#089981"/>
<text x="44.0" y="362.0" fill="#089981" font-size="12.5" font-weight="700">Quiet / no events</text>
<text x="276.0" y="362.0" fill="#d1d4dc" font-size="11.5">TRADE normally — the playbook applies in full.</text>
<text x="430.0" y="448" fill="#787b86" font-size="11.5" text-anchor="middle">Three outcomes: TRADE · WAIT · STAND ASIDE. When in doubt on event risk, stand aside.</text>
</svg>