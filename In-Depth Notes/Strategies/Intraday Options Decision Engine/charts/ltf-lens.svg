<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 440" font-family="Segoe UI,Arial,sans-serif">
<rect width="860" height="440" rx="12" fill="#131722"/>
<text x="26" y="30" fill="#d1d4dc" font-size="19" font-weight="700">LTF Lens — which read fits the moment</text>
<text x="26" y="49" fill="#787b86" font-size="12.5">On the LTF, choose the right lens: raw Price Action vs SMC vs Volume Profile</text>
<rect x="26.0" y="90.0" width="808.0" height="50.0" rx="8" fill="#1a2230" stroke="#1b2230" stroke-width="1"/>
<text x="42.0" y="112.0" fill="#d1d4dc" font-size="11.5" font-weight="600">Clean trend / momentum</text>
<text x="42.0" y="130.0" fill="#089981" font-size="12.5" font-weight="700">→ Price Action</text>
<text x="326.0" y="121.0" fill="#787b86" font-size="10.5">Read candles, structure, BOS — keep it simple in a clear trend.</text>
<rect x="26.0" y="148.0" width="808.0" height="50.0" rx="8" fill="#1a2230" stroke="#1b2230" stroke-width="1"/>
<text x="42.0" y="170.0" fill="#d1d4dc" font-size="11.5" font-weight="600">Sweeps &amp; liquidity grabs</text>
<text x="42.0" y="188.0" fill="#9c27b0" font-size="12.5" font-weight="700">→ SMC</text>
<text x="326.0" y="179.0" fill="#787b86" font-size="10.5">OB/FVG, equal H/L, inducement — when stops are being hunted.</text>
<rect x="26.0" y="206.0" width="808.0" height="50.0" rx="8" fill="#1a2230" stroke="#1b2230" stroke-width="1"/>
<text x="42.0" y="228.0" fill="#d1d4dc" font-size="11.5" font-weight="600">Range / acceptance / targets</text>
<text x="42.0" y="246.0" fill="#26c6da" font-size="12.5" font-weight="700">→ Volume Profile</text>
<text x="326.0" y="237.0" fill="#787b86" font-size="10.5">POC, HVN/LVN, value migration — for where price stalls or runs.</text>
<rect x="26.0" y="264.0" width="808.0" height="50.0" rx="8" fill="#1a2230" stroke="#1b2230" stroke-width="1"/>
<text x="42.0" y="286.0" fill="#d1d4dc" font-size="11.5" font-weight="600">Absorption / who's winning</text>
<text x="42.0" y="304.0" fill="#f0b90b" font-size="12.5" font-weight="700">→ Order-flow / delta</text>
<text x="326.0" y="295.0" fill="#787b86" font-size="10.5">CVD, footprint imbalance — to confirm effort vs result.</text>
<rect x="26.0" y="322.0" width="808.0" height="50.0" rx="8" fill="#1a2230" stroke="#1b2230" stroke-width="1"/>
<text x="42.0" y="344.0" fill="#d1d4dc" font-size="11.5" font-weight="600">Choppy / no structure</text>
<text x="42.0" y="362.0" fill="#f23645" font-size="12.5" font-weight="700">→ STAND ASIDE</text>
<text x="326.0" y="353.0" fill="#787b86" font-size="10.5">No lens fits cleanly = no trade; wait for a readable context.</text>
<text x="430.0" y="428" fill="#787b86" font-size="11.5" text-anchor="middle">Match the lens to the situation — forcing one framework on every chart creates noise.</text>
</svg>