<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 470" font-family="Segoe UI,Arial,sans-serif">
<rect width="860" height="470" rx="12" fill="#131722"/>
<text x="26" y="30" fill="#d1d4dc" font-size="19" font-weight="700">Regime Tree — fade or break?</text>
<text x="26" y="49" fill="#787b86" font-size="12.5">Read the regime first; it decides whether you fade levels or trade breaks</text>
<rect x="280.0" y="72.0" width="300.0" height="52.0" rx="8" fill="#161d2b" stroke="#26c6da" stroke-width="1.4"/>
<text x="430.0" y="96.0" fill="#d1d4dc" font-size="13" font-weight="700" text-anchor="middle">Read regime: GEX · PCR · max-pain · IV</text>
<text x="430.0" y="114.0" fill="#787b86" font-size="10.5" text-anchor="middle">structure: balance or trend?</text>
<defs><marker id="rtar" markerWidth="9" markerHeight="9" refX="6" refY="4.5" orient="auto"><path d="M0,0 L9,4.5 L0,9 z" fill="#787b86"/></marker></defs>
<path d="M430.0,124 L170.0,168.0" stroke="#787b86" stroke-width="1.6" marker-end="url(#rtar)"/>
<rect x="52.0" y="170.0" width="236.0" height="150.0" rx="8" fill="#161d2b" stroke="#089981" stroke-width="1.4"/>
<text x="170.0" y="194.0" fill="#089981" font-size="12" font-weight="700" text-anchor="middle">BALANCE + positive-GEX</text>
<text x="170.0" y="216.0" fill="#d1d4dc" font-size="13" font-weight="700" text-anchor="middle">→ FADE levels → reversals</text>
<text x="66.0" y="240.0" fill="#787b86" font-size="10">Range holds, pin to max-pain.</text>
<text x="66.0" y="253.0" fill="#787b86" font-size="10">Buy support, sell resistance.</text>
<text x="66.0" y="266.0" fill="#787b86" font-size="10">Low IV-rank favours buying.</text>
<path d="M430.0,124 L430.0,168.0" stroke="#787b86" stroke-width="1.6" marker-end="url(#rtar)"/>
<rect x="312.0" y="170.0" width="236.0" height="150.0" rx="8" fill="#161d2b" stroke="#f23645" stroke-width="1.4"/>
<text x="430.0" y="194.0" fill="#f23645" font-size="12" font-weight="700" text-anchor="middle">TREND + negative-GEX</text>
<text x="430.0" y="216.0" fill="#d1d4dc" font-size="13" font-weight="700" text-anchor="middle">→ Trade BREAKS</text>
<text x="326.0" y="240.0" fill="#787b86" font-size="10">Dealers chase price; breaks</text>
<text x="326.0" y="253.0" fill="#787b86" font-size="10">extend. Go with conviction</text>
<text x="326.0" y="266.0" fill="#787b86" font-size="10">closes. PCR + OI confirm</text>
<text x="326.0" y="279.0" fill="#787b86" font-size="10">direction.</text>
<path d="M430.0,124 L690.0,168.0" stroke="#787b86" stroke-width="1.6" marker-end="url(#rtar)"/>
<rect x="572.0" y="170.0" width="236.0" height="150.0" rx="8" fill="#161d2b" stroke="#f0b90b" stroke-width="1.4"/>
<text x="690.0" y="194.0" fill="#f0b90b" font-size="12" font-weight="700" text-anchor="middle">MIXED / unclear</text>
<text x="690.0" y="216.0" fill="#d1d4dc" font-size="13" font-weight="700" text-anchor="middle">→ WAIT</text>
<text x="586.0" y="240.0" fill="#787b86" font-size="10">Conflicting signals (e.g.</text>
<text x="586.0" y="253.0" fill="#787b86" font-size="10">trend but positive-GEX). No</text>
<text x="586.0" y="266.0" fill="#787b86" font-size="10">edge — wait for alignment.</text>
<text x="430.0" y="458" fill="#787b86" font-size="11.5" text-anchor="middle">Positive-GEX = mean-reversion (fade). Negative-GEX = acceleration (break). Mixed = patience.</text>
</svg>