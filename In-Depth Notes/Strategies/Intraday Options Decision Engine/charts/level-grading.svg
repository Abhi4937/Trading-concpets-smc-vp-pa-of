<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 470" font-family="Segoe UI,Arial,sans-serif">
<rect width="860" height="470" rx="12" fill="#131722"/>
<text x="26" y="30" fill="#d1d4dc" font-size="19" font-weight="700">Level Grading — qualify or drop</text>
<text x="26" y="49" fill="#787b86" font-size="12.5">A level earns a place on the chart only if it passes the filter (cap: 3–6 levels)</text>
<text x="36.0" y="86.0" fill="#089981" font-size="14" font-weight="700">KEEP — qualifies</text>
<text x="455.0" y="86.0" fill="#f23645" font-size="14" font-weight="700">DROP — declutter</text>
<rect x="36.0" y="102.0" width="389.0" height="62.0" rx="8" fill="#161d2b" stroke="#089981" stroke-width="1.4"/>
<text x="50.0" y="126.0" fill="#089981" font-size="12.5" font-weight="700">✓ Fresh / untested</text>
<text x="50.0" y="146.0" fill="#787b86" font-size="10.5">Not yet traded through — reaction still loaded.</text>
<rect x="36.0" y="176.0" width="389.0" height="62.0" rx="8" fill="#161d2b" stroke="#089981" stroke-width="1.4"/>
<text x="50.0" y="200.0" fill="#089981" font-size="12.5" font-weight="700">✓ HTF-aligned</text>
<text x="50.0" y="220.0" fill="#787b86" font-size="10.5">Comes from 1h/15m bias, not invented on the LTF.</text>
<rect x="36.0" y="250.0" width="389.0" height="62.0" rx="8" fill="#161d2b" stroke="#089981" stroke-width="1.4"/>
<text x="50.0" y="274.0" fill="#089981" font-size="12.5" font-weight="700">✓ Near price</text>
<text x="50.0" y="294.0" fill="#787b86" font-size="10.5">Reachable today; price can actually travel to it.</text>
<rect x="36.0" y="324.0" width="389.0" height="62.0" rx="8" fill="#161d2b" stroke="#089981" stroke-width="1.4"/>
<text x="50.0" y="348.0" fill="#089981" font-size="12.5" font-weight="700">✓ Resting liquidity</text>
<text x="50.0" y="368.0" fill="#787b86" font-size="10.5">Equal highs/lows, OB/FVG, or an OI wall sits there.</text>
<rect x="455.0" y="102.0" width="389.0" height="62.0" rx="8" fill="#161d2b" stroke="#f23645" stroke-width="1.4"/>
<text x="469.0" y="126.0" fill="#f23645" font-size="12.5" font-weight="700">✗ Tested / mitigated</text>
<text x="469.0" y="146.0" fill="#787b86" font-size="10.5">Already reacted — the fuel is gone.</text>
<rect x="455.0" y="176.0" width="389.0" height="62.0" rx="8" fill="#161d2b" stroke="#f23645" stroke-width="1.4"/>
<text x="469.0" y="200.0" fill="#f23645" font-size="12.5" font-weight="700">✗ Old / stale</text>
<text x="469.0" y="220.0" fill="#787b86" font-size="10.5">From days ago, far from current value.</text>
<rect x="455.0" y="250.0" width="389.0" height="62.0" rx="8" fill="#161d2b" stroke="#f23645" stroke-width="1.4"/>
<text x="469.0" y="274.0" fill="#f23645" font-size="12.5" font-weight="700">✗ Too far</text>
<text x="469.0" y="294.0" fill="#787b86" font-size="10.5">Out of today's expected range — irrelevant intraday.</text>
<text x="430.0" y="458" fill="#f0b90b" font-size="11.5" font-weight="600" text-anchor="middle">Hard cap ~3–6 levels. If a new one qualifies, drop the weakest — a clean chart is the edge.</text>
</svg>