<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 470" font-family="Segoe UI,Arial,sans-serif">
<rect width="860" height="470" rx="12" fill="#131722"/>
<text x="26" y="30" fill="#d1d4dc" font-size="19" font-weight="700">Reversal Grading — confluence scorecard</text>
<text x="26" y="49" fill="#787b86" font-size="12.5">Count the confluences; the grade decides the size (and whether to fade at all)</text>
<circle cx="36" cy="92" r="6" fill="none" stroke="#787b86" stroke-width="1.5"/>
<text x="54" y="96" fill="#d1d4dc" font-size="11.5">At a major HTF level / liquidity pool (PDH-PDL, range edge, equal H/L)</text>
<circle cx="36" cy="118" r="6" fill="none" stroke="#787b86" stroke-width="1.5"/>
<text x="54" y="122" fill="#d1d4dc" font-size="11.5">BALANCE / range / positive-GEX (pin) regime — not a trend</text>
<circle cx="36" cy="144" r="6" fill="none" stroke="#787b86" stroke-width="1.5"/>
<text x="54" y="148" fill="#d1d4dc" font-size="11.5">Sweep of the obvious liquidity (wick beyond the level)</text>
<circle cx="36" cy="170" r="6" fill="none" stroke="#787b86" stroke-width="1.5"/>
<text x="54" y="174" fill="#d1d4dc" font-size="11.5">CLOSE back inside the level (failed break, not acceptance)</text>
<circle cx="36" cy="196" r="6" fill="none" stroke="#787b86" stroke-width="1.5"/>
<text x="54" y="200" fill="#d1d4dc" font-size="11.5">Effort fails: low-vol poke OR absorption OR CVD divergence</text>
<circle cx="36" cy="222" r="6" fill="none" stroke="#787b86" stroke-width="1.5"/>
<text x="54" y="226" fill="#d1d4dc" font-size="11.5">CHoCH / shift against the break (structure turns)</text>
<circle cx="36" cy="248" r="6" fill="none" stroke="#787b86" stroke-width="1.5"/>
<text x="54" y="252" fill="#d1d4dc" font-size="11.5">Options re-defend: wall OI rising, no migration, premium flat</text>
<circle cx="36" cy="274" r="6" fill="none" stroke="#787b86" stroke-width="1.5"/>
<text x="54" y="278" fill="#d1d4dc" font-size="11.5">Pinned toward / pulled to max-pain (esp. expiry afternoon)</text>
<circle cx="36" cy="300" r="6" fill="none" stroke="#787b86" stroke-width="1.5"/>
<text x="54" y="304" fill="#d1d4dc" font-size="11.5">Clean reclaim / failed-retest entry with a confirmation candle</text>
<circle cx="36" cy="326" r="6" fill="none" stroke="#787b86" stroke-width="1.5"/>
<text x="54" y="330" fill="#d1d4dc" font-size="11.5">R:R ≥ 2:1 to the range mid / opposite edge</text>
<rect x="600" y="88" width="234" height="56" rx="8" fill="#1a2230" stroke="#089981" stroke-width="1.4"/>
<text x="614" y="110" fill="#089981" font-size="14" font-weight="700">A+ fade</text>
<text x="614" y="128" fill="#d1d4dc" font-size="11">≥ 8 / 10 — full size</text>
<rect x="600" y="160" width="234" height="56" rx="8" fill="#1a2230" stroke="#26c6da" stroke-width="1.4"/>
<text x="614" y="182" fill="#26c6da" font-size="14" font-weight="700">A fade</text>
<text x="614" y="200" fill="#d1d4dc" font-size="11">6–7 / 10 — ½–¾ size</text>
<rect x="600" y="232" width="234" height="56" rx="8" fill="#1a2230" stroke="#f23645" stroke-width="1.4"/>
<text x="614" y="254" fill="#f23645" font-size="14" font-weight="700">Skip</text>
<text x="614" y="272" fill="#d1d4dc" font-size="11">≤ 5 / 10 — no trade</text>
<text x="430.0" y="458" fill="#787b86" font-size="11.5" text-anchor="middle">Core disqualifiers: a NEGATIVE-GEX trend, or price still ACCEPTING beyond the level — those are no-trades regardless of count.</text>
</svg>