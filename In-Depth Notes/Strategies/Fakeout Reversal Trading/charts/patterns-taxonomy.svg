<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 470" font-family="Segoe UI,Arial,sans-serif">
<rect width="860" height="470" rx="12" fill="#131722"/>
<text x="26" y="30" fill="#d1d4dc" font-size="19" font-weight="700">The Fakeout-Reversal Family</text>
<text x="26" y="49" fill="#787b86" font-size="12.5">Five names for the same engine: take the obvious liquidity, then fail to hold it</text>
<rect x="26" y="80" width="400" height="110" rx="9" fill="#161d2b" stroke="#089981" stroke-width="1.4"/>
<text x="42" y="108" fill="#089981" font-size="14" font-weight="700">Turtle Soup</text>
<text x="42" y="132" fill="#d1d4dc" font-size="11.5">False break of an N-bar high/low, then snap</text>
<text x="42" y="147" fill="#d1d4dc" font-size="11.5">back inside → fade. (Raschke &amp; Connors)</text>
<rect x="444" y="80" width="400" height="110" rx="9" fill="#161d2b" stroke="#26c6da" stroke-width="1.4"/>
<text x="460" y="108" fill="#26c6da" font-size="14" font-weight="700">Swing Failure (SFP)</text>
<text x="460" y="132" fill="#d1d4dc" font-size="11.5">Sweep a prior swing high/low and CLOSE back</text>
<text x="460" y="147" fill="#d1d4dc" font-size="11.5">beyond it → reverse. (ICT)</text>
<rect x="26" y="208" width="400" height="110" rx="9" fill="#161d2b" stroke="#089981" stroke-width="1.4"/>
<text x="42" y="236" fill="#089981" font-size="14" font-weight="700">Wyckoff Spring</text>
<text x="42" y="260" fill="#d1d4dc" font-size="11.5">Shakeout BELOW range support that immediately</text>
<text x="42" y="275" fill="#d1d4dc" font-size="11.5">reclaims → markup long.</text>
<rect x="444" y="208" width="400" height="110" rx="9" fill="#161d2b" stroke="#f23645" stroke-width="1.4"/>
<text x="460" y="236" fill="#f23645" font-size="14" font-weight="700">Upthrust / UTAD</text>
<text x="460" y="260" fill="#d1d4dc" font-size="11.5">Stab ABOVE range resistance that fails back</text>
<text x="460" y="275" fill="#d1d4dc" font-size="11.5">inside → markdown short.</text>
<rect x="26" y="336" width="400" height="110" rx="9" fill="#161d2b" stroke="#f0b90b" stroke-width="1.4"/>
<text x="42" y="364" fill="#f0b90b" font-size="14" font-weight="700">Failed Auction / Poor High-Low</text>
<text x="42" y="388" fill="#d1d4dc" font-size="11.5">Thin, unfinished extreme is revisited → fade</text>
<text x="42" y="403" fill="#d1d4dc" font-size="11.5">back to the naked POC. (Dalton)</text>
<rect x="444" y="336" width="400" height="110" rx="9" fill="#161d2b" stroke="#9c27b0" stroke-width="1.4"/>
<text x="460" y="364" fill="#9c27b0" font-size="14" font-weight="700">Stop-Hunt Reversal</text>
<text x="460" y="388" fill="#d1d4dc" font-size="11.5">Liquidity grab at the obvious level (round #,</text>
<text x="460" y="403" fill="#d1d4dc" font-size="11.5">PDH/PDL, IB edge) → reverse.</text>
</svg>