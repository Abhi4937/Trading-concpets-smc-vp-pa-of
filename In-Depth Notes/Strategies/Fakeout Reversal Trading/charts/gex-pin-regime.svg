<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 460" font-family="Segoe UI,Arial,sans-serif">
<rect width="860" height="460" rx="12" fill="#131722"/>
<text x="26" y="30" fill="#d1d4dc" font-size="19" font-weight="700">Dealer Gamma — which regime are you in?</text>
<text x="26" y="49" fill="#787b86" font-size="12.5">POSITIVE GEX pins price (reversals work); NEGATIVE GEX lets it run (do NOT fade)</text>
<text x="40" y="100" fill="#26c6da" font-size="13.5" font-weight="700">POSITIVE GEX → PIN / mean-reversion</text>
<line x1="40" y1="235.0" x2="360" y2="235.0" stroke="#f0b90b" stroke-width="1.3" stroke-dasharray="5 4"/>
<text x="360" y="231.0" fill="#f0b90b" font-size="10" text-anchor="end">key strike / max-pain</text>
<path d="M40,235.0 L80,217.0 L120,249.0 L160,219.0 L200,245.0 L240,227.0 L280,241.0 L320,231.0 L360,237.0" stroke="#26c6da" stroke-width="2.6" fill="none"/>
<text x="40" y="362" fill="#26c6da" font-size="11.5" font-weight="700">← TRADE REVERSALS HERE</text>
<text x="40" y="380" fill="#787b86" font-size="10">Dealers buy dips &amp; sell rips — price is pinned to</text>
<text x="40" y="393" fill="#787b86" font-size="10">heavy-OI strikes. Sweeps fail; fade the edges back to</text>
<text x="40" y="406" fill="#787b86" font-size="10">the pin.</text>
<text x="480" y="100" fill="#f23645" font-size="13.5" font-weight="700">NEGATIVE GEX → trend / acceleration</text>
<line x1="480" y1="235.0" x2="800" y2="235.0" stroke="#f0b90b" stroke-width="1.3" stroke-dasharray="5 4"/>
<text x="800" y="231.0" fill="#f0b90b" font-size="10" text-anchor="end">key strike / max-pain</text>
<path d="M480,235.0 L520,229.0 L560,223.0 L600,225.0 L640,205.0 L680,180.0 L720,150.0 L760,115.0 L800,85.0" stroke="#f23645" stroke-width="2.6" fill="none"/>
<text x="480" y="362" fill="#f23645" font-size="11.5" font-weight="700">← do NOT fade here</text>
<text x="480" y="380" fill="#787b86" font-size="10">Dealers chase price — sweeps become real breaks that</text>
<text x="480" y="393" fill="#787b86" font-size="10">run. Fading here is the cardinal error.</text>
<text x="430.0" y="448" fill="#787b86" font-size="11.5" text-anchor="middle">Read GEX FIRST: a fakeout reversal is a positive-gamma / pinning / balance play. In negative gamma, stand aside.</text>
</svg>