<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 460" font-family="Segoe UI,Arial,sans-serif">
<rect width="860" height="460" rx="12" fill="#131722"/>
<text x="26" y="30" fill="#d1d4dc" font-size="19" font-weight="700">OI Re-Defense — the wall HOLDS</text>
<text x="26" y="49" fill="#787b86" font-size="12.5">Call OI RISING at the tested strike = writers defending the ceiling → the break fails</text>
<text x="26" y="114" fill="#d1d4dc" font-size="12" font-weight="600">23 200 CE</text>
<rect x="190" y="96" width="126" height="24" rx="3" fill="#787b86" opacity="0.85"/>
<text x="324" y="114" fill="#787b86" font-size="10.5">light — unchanged</text>
<text x="26" y="156" fill="#d1d4dc" font-size="12" font-weight="600">23 100 CE</text>
<rect x="190" y="138" width="176" height="24" rx="3" fill="#787b86" opacity="0.85"/>
<text x="374" y="156" fill="#787b86" font-size="10.5">light — no fresh writing</text>
<text x="26" y="198" fill="#d1d4dc" font-size="12" font-weight="600">23 000 CE</text>
<rect x="190" y="180" width="386" height="24" rx="3" fill="#f23645" opacity="0.85"/>
<text x="584" y="198" fill="#f23645" font-size="10.5">TESTED strike — OI RISING ↑ (writers re-defend)</text>
<text x="26" y="240" fill="#d1d4dc" font-size="12" font-weight="600">22 900 CE</text>
<rect x="190" y="222" width="210" height="24" rx="3" fill="#787b86" opacity="0.85"/>
<text x="408" y="240" fill="#787b86" font-size="10.5">unchanged</text>
<text x="26" y="282" fill="#d1d4dc" font-size="12" font-weight="600">22 800 CE</text>
<rect x="190" y="264" width="168" height="24" rx="3" fill="#787b86" opacity="0.85"/>
<text x="366" y="282" fill="#787b86" font-size="10.5">unchanged</text>
<text x="26" y="332" fill="#f0b90b" font-size="11.5" font-weight="600">Price pokes ABOVE 23 000 — but the OI at 23 000 keeps RISING, not unwinding.</text>
<text x="430.0" y="446" fill="#787b86" font-size="11.5" text-anchor="middle">Compare the breakout note: a REAL break needs the wall OI to DROP (writers capitulate). Rising OI = the ceiling held → fade.</text>
</svg>