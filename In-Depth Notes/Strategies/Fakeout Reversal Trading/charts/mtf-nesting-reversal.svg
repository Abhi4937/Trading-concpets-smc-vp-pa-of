<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 566" font-family="Segoe UI,Arial,sans-serif">
<rect width="860" height="566" rx="12" fill="#131722"/>
<text x="26" y="30" fill="#d1d4dc" font-size="19" font-weight="700">Multi-Timeframe Nesting (reversal)</text>
<text x="26" y="49" fill="#787b86" font-size="12.5">HTF gives the REGIME &amp; level · MTF gives the SWEEP level · LTF gives the RECLAIM trigger</text>
<rect x="40" y="78" width="440" height="128" rx="8" fill="#161d2b" stroke="#2962ff" stroke-width="1.4"/>
<text x="54" y="102" fill="#2962ff" font-size="14" font-weight="700">1h — REGIME &amp; LEVEL</text>
<path d="M54.0,154.0 L110.0,178.0 L166.0,130.0 L222.0,169.0 L278.0,124.0 L334.0,160.0" stroke="#2962ff" stroke-width="2.4" fill="none"/>
<text x="342" y="100" fill="#787b86" font-size="9.5">Balance/range? Positive</text>
<text x="342" y="113" fill="#787b86" font-size="9.5">GEX? Mark the major</text>
<text x="342" y="126" fill="#787b86" font-size="9.5">level / liquidity pool</text>
<text x="342" y="139" fill="#787b86" font-size="9.5">you intend to fade.</text>
<path d="M260.0,206 L260.0,224" stroke="#787b86" stroke-width="1.6" marker-end="url(#mtfar)"/>
<rect x="40" y="228" width="440" height="128" rx="8" fill="#161d2b" stroke="#f0b90b" stroke-width="1.4"/>
<text x="54" y="252" fill="#f0b90b" font-size="14" font-weight="700">15m — THE SWEEP LEVEL</text>
<path d="M54.0,314.0 L100.7,305.3 L147.3,309.7 L194.0,279.3 L240.7,314.0 L287.3,318.3 L334.0,322.7" stroke="#f0b90b" stroke-width="2.4" fill="none"/>
<line x1="54" y1="305.3" x2="334" y2="305.3" stroke="#f0b90b" stroke-width="1.2" stroke-dasharray="5 4"/>
<text x="342" y="250" fill="#787b86" font-size="9.5">The equal highs/lows /</text>
<text x="342" y="263" fill="#787b86" font-size="9.5">range edge being raided</text>
<text x="342" y="276" fill="#787b86" font-size="9.5">— where retail breakout</text>
<text x="342" y="289" fill="#787b86" font-size="9.5">stops are parked.</text>
<path d="M260.0,356 L260.0,374" stroke="#787b86" stroke-width="1.6" marker-end="url(#mtfar)"/>
<rect x="40" y="378" width="440" height="128" rx="8" fill="#161d2b" stroke="#089981" stroke-width="1.4"/>
<text x="54" y="402" fill="#089981" font-size="14" font-weight="700">5m — THE RECLAIM TRIGGER</text>
<path d="M54.0,443.2 L89.0,422.4 L124.0,443.2 L159.0,445.8 L194.0,458.8 L229.0,456.2 L264.0,469.2 L299.0,466.6 L334.0,479.6" stroke="#089981" stroke-width="2.4" fill="none"/>
<line x1="54" y1="443.2" x2="334" y2="443.2" stroke="#f0b90b" stroke-width="1.2" stroke-dasharray="5 4"/>
<text x="342" y="400" fill="#787b86" font-size="9.5">Sweep + close back</text>
<text x="342" y="413" fill="#787b86" font-size="9.5">inside → CHoCH →</text>
<text x="342" y="426" fill="#787b86" font-size="9.5">reclaim / failed-retest</text>
<text x="342" y="439" fill="#787b86" font-size="9.5">with a confirmation</text>
<text x="342" y="452" fill="#787b86" font-size="9.5">candle → enter.</text>
<defs><marker id="mtfar" markerWidth="9" markerHeight="9" refX="6" refY="4.5" orient="auto"><path d="M0,0 L9,4.5 L0,9 z" fill="#787b86"/></marker></defs>
<text x="510" y="96" fill="#d1d4dc" font-size="13" font-weight="700">The funnel</text>
<text x="510" y="116" fill="#2962ff" font-size="12" font-weight="700">Regime</text>
<text x="510" y="132" fill="#787b86" font-size="10">1h says balance/pinning — the</text>
<text x="510" y="145" fill="#787b86" font-size="10">only place a reversal is</text>
<text x="510" y="158" fill="#787b86" font-size="10">high-probability.</text>
<text x="510" y="180" fill="#f0b90b" font-size="12" font-weight="700">Where</text>
<text x="510" y="196" fill="#787b86" font-size="10">15m marks the exact swept edge</text>
<text x="510" y="209" fill="#787b86" font-size="10">/ liquidity pool; the 5m never</text>
<text x="510" y="222" fill="#787b86" font-size="10">invents it.</text>
<text x="510" y="244" fill="#089981" font-size="12" font-weight="700">Trigger</text>
<text x="510" y="260" fill="#787b86" font-size="10">Sweep + close back + CHoCH +</text>
<text x="510" y="273" fill="#787b86" font-size="10">reclaim — only then do you</text>
<text x="510" y="286" fill="#787b86" font-size="10">fade.</text>
<text x="430.0" y="554" fill="#787b86" font-size="11.5" text-anchor="middle">You fade the IMMEDIATE break, but the target is back INTO higher-timeframe value.</text>
</svg>