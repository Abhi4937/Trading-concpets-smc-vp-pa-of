<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 460" font-family="Segoe UI,Arial,sans-serif">
<rect width="860" height="460" rx="12" fill="#131722"/>
<text x="26" y="30" fill="#d1d4dc" font-size="19" font-weight="700">Which game today? — read the regime FIRST</text>
<text x="26" y="49" fill="#787b86" font-size="12.5">One read (GEX + structure) routes you to the breakout playbook OR this reversal playbook</text>
<rect x="260.0" y="80" width="340" height="48" rx="10" fill="#1a2230" stroke="#f0b90b" stroke-width="1.6"/>
<text x="430.0" y="100" fill="#f0b90b" font-size="13.5" font-weight="700" text-anchor="middle">Read the regime: GEX + structure</text>
<text x="430.0" y="118" fill="#787b86" font-size="11" text-anchor="middle">Balance or trend? Pinning or expanding?</text>
<path d="M390.0,128 L210,180" stroke="#787b86" stroke-width="1.6" marker-end="url(#dtar)"/>
<path d="M470.0,128 L650,180" stroke="#787b86" stroke-width="1.6" marker-end="url(#dtar)"/>
<defs><marker id="dtar" markerWidth="9" markerHeight="9" refX="6" refY="4.5" orient="auto"><path d="M0,0 L9,4.5 L0,9 z" fill="#787b86"/></marker></defs>
<rect x="60" y="190" width="330" height="190" rx="10" fill="#161d2b" stroke="#26c6da" stroke-width="1.6"/>
<text x="78" y="218" fill="#26c6da" font-size="14" font-weight="700">REVERSAL game (this note)</text>
<text x="78" y="244" fill="#d1d4dc" font-size="11.5">• Positive GEX / pinning</text>
<text x="78" y="268" fill="#d1d4dc" font-size="11.5">• Balance / range / rotation</text>
<text x="78" y="292" fill="#d1d4dc" font-size="11.5">• Expiry-afternoon, lunch chop</text>
<text x="78" y="316" fill="#d1d4dc" font-size="11.5">• Price near / pulled to max-pain</text>
<text x="78" y="348" fill="#26c6da" font-size="11.5" font-weight="600">→ Fade the swept edges back to the mean.</text>
<rect x="470" y="190" width="330" height="190" rx="10" fill="#161d2b" stroke="#f23645" stroke-width="1.6"/>
<text x="488" y="218" fill="#f23645" font-size="14" font-weight="700">BREAKOUT game (the twin)</text>
<text x="488" y="244" fill="#d1d4dc" font-size="11.5">• Negative GEX / acceleration</text>
<text x="488" y="268" fill="#d1d4dc" font-size="11.5">• Trend / expansion</text>
<text x="488" y="292" fill="#d1d4dc" font-size="11.5">• Opening drive, post-event</text>
<text x="488" y="316" fill="#d1d4dc" font-size="11.5">• Price away from max-pain</text>
<text x="488" y="348" fill="#f23645" font-size="11.5" font-weight="600">→ Trade the break in the trend direction.</text>
<text x="430.0" y="446" fill="#787b86" font-size="11.5" text-anchor="middle">Never fade a negative-GEX trend; never chase a breakout in a positive-GEX pin. The regime picks the playbook.</text>
</svg>