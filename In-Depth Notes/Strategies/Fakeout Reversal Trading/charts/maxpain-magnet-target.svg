<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 460" font-family="Segoe UI,Arial,sans-serif">
<rect width="860" height="460" rx="12" fill="#131722"/>
<text x="26" y="30" fill="#d1d4dc" font-size="19" font-weight="700">Max-Pain Magnet — the reversal target</text>
<text x="26" y="49" fill="#787b86" font-size="12.5">Into expiry, price is pulled back toward max-pain / the largest-gamma strike</text>
<line x1="150" y1="245.0" x2="710" y2="245.0" stroke="#f0b90b" stroke-width="1.6" stroke-dasharray="6 4"/>
<text x="150" y="237.0" fill="#f0b90b" font-size="11" font-weight="600">max-pain / ATM wall (the pin)</text>
<path d="M150,245.0 L150,245.0 L210,235.0 L270,217.0 L320,193.0 L340,205.0 L380,227.0 L440,241.0 L510,247.0 L590,243.0 L710,245.0" stroke="#26c6da" stroke-width="2.8" fill="none"/>
<text x="325" y="187.0" fill="#f23645" font-size="11" font-weight="600">poke above (bull trap)</text>
<path d="M400,215.0 L480,239.0" stroke="#26c6da" stroke-width="2.2" marker-end="url(#mpar)"/>
<text x="450" y="215.0" fill="#26c6da" font-size="11" font-weight="700">pulled back to the pin = your target</text>
<defs><marker id="mpar" markerWidth="9" markerHeight="9" refX="6" refY="4.5" orient="auto"><path d="M0,0 L9,4.5 L0,9 z" fill="#26c6da"/></marker></defs>
<text x="430.0" y="446" fill="#787b86" font-size="11.5" text-anchor="middle">On expiry afternoon the pin is strongest — fade pokes away from max-pain back toward it (PCR extremes warn of crowded positioning).</text>
</svg>