<text x="430.0" y="377.9" fill="#787b86" font-size="10.5" font-weight="500" text-anchor="middle" opacity="0">reclaim &amp; hold above OR-high = go long; close back inside the OR = the sweep failed → short<animate attributeName="opacity" from="0" to="1" begin="2.00s" dur="0.4s" fill="freeze"/></text>
<text x="430.0" y="446" fill="#787b86" font-size="12" text-anchor="middle">A sweep is only a long once it RECLAIMS; a sweep that closes back inside the OR is the short signal.</text>
