<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 566" font-family="Segoe UI,Arial,sans-serif">
<rect width="860" height="566" rx="12" fill="#131722"/>
<text x="26" y="30" fill="#d1d4dc" font-size="19" font-weight="700">Multi-Timeframe Nesting for the ORB</text>
<text x="26" y="49" fill="#787b86" font-size="12.5">1h/30m REGIME → 15m OPENING RANGE → 5m TRIGGER</text>
<rect x="40" y="78" width="440" height="128" rx="8" fill="#161d2b" stroke="#2962ff" stroke-width="1.4"/>
<text x="54" y="102" fill="#2962ff" font-size="14" font-weight="700">1h / 30m — REGIME</text>
<path d="M54.0,184.1 L110.0,162.0 L166.0,166.5 L222.0,140.0 L278.0,145.8 L334.0,117.9" stroke="#2962ff" stroke-width="2.4" fill="none"/>
<text x="342" y="100" fill="#787b86" font-size="9.5">Trend vs balance,</text>
<text x="342" y="113" fill="#787b86" font-size="9.5">PDH/PDL, prior-day</text>
<text x="342" y="126" fill="#787b86" font-size="9.5">value &amp; naked POC,</text>
<text x="342" y="139" fill="#787b86" font-size="9.5">OI-wall band, GEX. →</text>
<text x="342" y="152" fill="#787b86" font-size="9.5">sets fade-vs-break</text>
<text x="342" y="165" fill="#787b86" font-size="9.5">bias.</text>
<path d="M260.0,206 L260.0,224" stroke="#787b86" stroke-width="1.6" marker-end="url(#mtfar)"/>
<rect x="40" y="228" width="440" height="128" rx="8" fill="#161d2b" stroke="#f0b90b" stroke-width="1.4"/>
<text x="54" y="252" fill="#f0b90b" font-size="14" font-weight="700">15m — THE OPENING RANGE</text>
<path d="M54.0,323.3 L100.7,328.9 L147.3,320.5 L194.0,326.1 L240.7,317.7 L287.3,320.5 L334.0,273.1" stroke="#f0b90b" stroke-width="2.4" fill="none"/>
<line x1="54" y1="328.9" x2="334" y2="328.9" stroke="#f0b90b" stroke-width="1.2" stroke-dasharray="5 4"/>
<text x="342" y="250" fill="#787b86" font-size="9.5">The OR box (9:15–9:30)</text>
<text x="342" y="263" fill="#787b86" font-size="9.5">— the break level, its</text>
<text x="342" y="276" fill="#787b86" font-size="9.5">width (measured move),</text>
<text x="342" y="289" fill="#787b86" font-size="9.5">and the liquidity</text>
<text x="342" y="302" fill="#787b86" font-size="9.5">above/below.</text>
<path d="M260.0,356 L260.0,374" stroke="#787b86" stroke-width="1.6" marker-end="url(#mtfar)"/>
<rect x="40" y="378" width="440" height="128" rx="8" fill="#161d2b" stroke="#089981" stroke-width="1.4"/>
<text x="54" y="402" fill="#089981" font-size="14" font-weight="700">5m — THE TRIGGER</text>
<path d="M54.0,475.2 L89.0,468.9 L124.0,473.1 L159.0,481.6 L194.0,462.6 L229.0,464.7 L264.0,441.5 L299.0,445.7 L334.0,420.4" stroke="#089981" stroke-width="2.4" fill="none"/>
<line x1="54" y1="468.9" x2="334" y2="468.9" stroke="#f0b90b" stroke-width="1.2" stroke-dasharray="5 4"/>
<text x="342" y="400" fill="#787b86" font-size="9.5">Conviction close beyond</text>
<text x="342" y="413" fill="#787b86" font-size="9.5">the OR, sweep-and-go vs</text>
<text x="342" y="426" fill="#787b86" font-size="9.5">sweep-and-reverse,</text>
<text x="342" y="439" fill="#787b86" font-size="9.5">retest of OR edge /</text>
<text x="342" y="452" fill="#787b86" font-size="9.5">VWAP with +delta.</text>
<defs><marker id="mtfar" markerWidth="9" markerHeight="9" refX="6" refY="4.5" orient="auto"><path d="M0,0 L9,4.5 L0,9 z" fill="#787b86"/></marker></defs>
<text x="510" y="96" fill="#d1d4dc" font-size="13" font-weight="700">The funnel</text>
<text x="510" y="116" fill="#2962ff" font-size="12" font-weight="700">Align?</text>
<text x="510" y="132" fill="#787b86" font-size="10">5m OR break must agree with the</text>
<text x="510" y="145" fill="#787b86" font-size="10">1h/30m regime — else it is a</text>
<text x="510" y="158" fill="#787b86" font-size="10">counter-trend fade, not a</text>
<text x="510" y="171" fill="#787b86" font-size="10">trade.</text>
<text x="510" y="193" fill="#f0b90b" font-size="12" font-weight="700">Level</text>
<text x="510" y="209" fill="#787b86" font-size="10">The OR is fixed on the 15m; the</text>
<text x="510" y="222" fill="#787b86" font-size="10">5m never invents its own range</text>
<text x="510" y="235" fill="#787b86" font-size="10">— it only triggers the break.</text>
<text x="510" y="257" fill="#089981" font-size="12" font-weight="700">Confirm</text>
<text x="510" y="273" fill="#787b86" font-size="10">Options layer (OI/IV/GEX) sets</text>
<text x="510" y="286" fill="#787b86" font-size="10">the environment; the 5m candle</text>
<text x="510" y="299" fill="#787b86" font-size="10">pulls the trigger.</text>
<text x="430.0" y="554" fill="#787b86" font-size="11.5" text-anchor="middle">Regime sets the bias, the 15m sets the range, the 5m pulls the trigger.</text>
</svg>