<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 470" font-family="Segoe UI,Arial,sans-serif">
<rect width="860" height="470" rx="12" fill="#131722"/>
<text x="26" y="30" fill="#d1d4dc" font-size="19" font-weight="700">Day-Type Decision Tree — trade, fade, or stand aside</text>
<text x="26" y="49" fill="#787b86" font-size="12.5">The regime decides whether to trade the OR break, fade it, or skip the day</text>
<rect x="270.0" y="72.0" width="320.0" height="52.0" rx="8" fill="#161d2b" stroke="#26c6da" stroke-width="1.4"/>
<text x="430.0" y="96.0" fill="#d1d4dc" font-size="13" font-weight="700" text-anchor="middle">Read day-type / regime: trend vs balance · GEX</text>
<text x="430.0" y="114.0" fill="#787b86" font-size="10.5" text-anchor="middle">then apply the matching ORB action</text>
<defs><marker id="dtar" markerWidth="9" markerHeight="9" refX="6" refY="4.5" orient="auto"><path d="M0,0 L9,4.5 L0,9 z" fill="#787b86"/></marker></defs>
<path d="M430.0,124 L168.0,168.0" stroke="#787b86" stroke-width="1.6" marker-end="url(#dtar)"/>
<rect x="48.0" y="170.0" width="240.0" height="150.0" rx="8" fill="#161d2b" stroke="#089981" stroke-width="1.4"/>
<text x="168.0" y="194.0" fill="#089981" font-size="12" font-weight="700" text-anchor="middle">TREND / negative-GEX</text>
<text x="168.0" y="216.0" fill="#d1d4dc" font-size="13" font-weight="700" text-anchor="middle">→ TRADE the break</text>
<text x="62.0" y="240.0" fill="#787b86" font-size="10">Dealers chase price; OR break</text>
<text x="62.0" y="253.0" fill="#787b86" font-size="10">extends. Go with the</text>
<text x="62.0" y="266.0" fill="#787b86" font-size="10">conviction close, target the</text>
<text x="62.0" y="279.0" fill="#787b86" font-size="10">measured move.</text>
<path d="M430.0,124 L430.0,168.0" stroke="#787b86" stroke-width="1.6" marker-end="url(#dtar)"/>
<rect x="310.0" y="170.0" width="240.0" height="150.0" rx="8" fill="#161d2b" stroke="#f23645" stroke-width="1.4"/>
<text x="430.0" y="194.0" fill="#f23645" font-size="12" font-weight="700" text-anchor="middle">BALANCE / positive-GEX</text>
<text x="430.0" y="216.0" fill="#d1d4dc" font-size="13" font-weight="700" text-anchor="middle">→ FADE the break</text>
<text x="324.0" y="240.0" fill="#787b86" font-size="10">Range/pin day. OR breaks fail;</text>
<text x="324.0" y="253.0" fill="#787b86" font-size="10">fade the poke back into the</text>
<text x="324.0" y="266.0" fill="#787b86" font-size="10">range, target the opposite OR</text>
<text x="324.0" y="279.0" fill="#787b86" font-size="10">edge.</text>
<path d="M430.0,124 L692.0,168.0" stroke="#787b86" stroke-width="1.6" marker-end="url(#dtar)"/>
<rect x="572.0" y="170.0" width="240.0" height="150.0" rx="8" fill="#161d2b" stroke="#f0b90b" stroke-width="1.4"/>
<text x="692.0" y="194.0" fill="#f0b90b" font-size="12" font-weight="700" text-anchor="middle">CHOP / no edge</text>
<text x="692.0" y="216.0" fill="#d1d4dc" font-size="13" font-weight="700" text-anchor="middle">→ STAND ASIDE</text>
<text x="586.0" y="240.0" fill="#787b86" font-size="10">Overlapping bars, no</text>
<text x="586.0" y="253.0" fill="#787b86" font-size="10">conviction, news risk. No</text>
<text x="586.0" y="266.0" fill="#787b86" font-size="10">clean OR break to trade — wait</text>
<text x="586.0" y="279.0" fill="#787b86" font-size="10">or skip.</text>
<text x="430.0" y="458" fill="#787b86" font-size="11.5" text-anchor="middle">Negative-GEX / trend = trade breaks. Positive-GEX / balance = fade them. Chop = no trade.</text>
</svg>