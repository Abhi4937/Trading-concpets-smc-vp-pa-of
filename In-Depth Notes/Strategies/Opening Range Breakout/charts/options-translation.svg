<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 430" font-family="Segoe UI,Arial,sans-serif">
<rect width="860" height="430" rx="12" fill="#131722"/>
<text x="26" y="30" fill="#d1d4dc" font-size="19" font-weight="700">Spot OR Break → the Option Trade</text>
<text x="26" y="49" fill="#787b86" font-size="12.5">Translate the spot ORB into a strike, a delta, and a premium stop</text>
<rect x="36.0" y="80.0" width="788.0" height="56.0" rx="8" fill="#1d2330" stroke="#f0b90b" stroke-width="1.4"/>
<text x="430.0" y="115.0" fill="#f0b90b" font-size="16" font-weight="700" text-anchor="middle">premium stop  ≈  point-stop × delta   (or 20% of entry premium)</text>
<rect x="36.0" y="160.0" width="788.0" height="48.0" rx="8" fill="#161d2b" stroke="#2962ff" stroke-width="1.4"/>
<text x="52.0" y="182.0" fill="#2962ff" font-size="12" font-weight="700">Pick the strike</text>
<text x="52.0" y="200.0" fill="#d1d4dc" font-size="13.5" font-weight="700">ATM / near-ATM</text>
<text x="366.0" y="191.0" fill="#787b86" font-size="10.5">Delta 0.4–0.6, premium ≈ ₹0.5 per spot point. Avoid deep OTM lottery strikes.</text>
<rect x="36.0" y="218.0" width="788.0" height="48.0" rx="8" fill="#161d2b" stroke="#26c6da" stroke-width="1.4"/>
<text x="52.0" y="240.0" fill="#26c6da" font-size="12" font-weight="700">Direction</text>
<text x="52.0" y="258.0" fill="#d1d4dc" font-size="13.5" font-weight="700">up-break → call · down-break → put</text>
<text x="366.0" y="249.0" fill="#787b86" font-size="10.5">Match the option to the OR break direction.</text>
<rect x="36.0" y="276.0" width="788.0" height="48.0" rx="8" fill="#161d2b" stroke="#f0b90b" stroke-width="1.4"/>
<text x="52.0" y="298.0" fill="#f0b90b" font-size="12" font-weight="700">Premium stop</text>
<text x="52.0" y="316.0" fill="#d1d4dc" font-size="13.5" font-weight="700">20% of entry premium</text>
<text x="366.0" y="307.0" fill="#787b86" font-size="10.5">If bought at 120, hard stop near 96 (≈20%).</text>
<rect x="36.0" y="334.0" width="788.0" height="48.0" rx="8" fill="#161d2b" stroke="#089981" stroke-width="1.4"/>
<text x="52.0" y="356.0" fill="#089981" font-size="12" font-weight="700">…or delta-based</text>
<text x="52.0" y="374.0" fill="#d1d4dc" font-size="13.5" font-weight="700">point-stop × delta</text>
<text x="366.0" y="365.0" fill="#787b86" font-size="10.5">30-pt spot stop × 0.5 delta ≈ 15 premium points.</text>
<text x="430.0" y="418" fill="#f0b90b" font-size="11.5" font-weight="600" text-anchor="middle">Deep-OTM looks cheap but the delta is tiny — the spot break barely moves the premium. Stay near ATM.</text>
</svg>