<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 400" font-family="Segoe UI,Arial,sans-serif">
<rect width="860" height="400" rx="12" fill="#131722"/>
<text x="26" y="30" fill="#d1d4dc" font-size="19" font-weight="700">Open Types — how the OR forms &amp; resolves</text>
<text x="26" y="49" fill="#787b86" font-size="12.5">Gap-up / gap-down / flat: each shapes the opening range differently</text>
<rect x="34.0" y="82.0" width="252.0" height="210.0" rx="8" fill="#161d2b" stroke="#089981" stroke-width="1.4"/>
<text x="48.0" y="106.0" fill="#089981" font-size="14" font-weight="700">GAP-UP</text>
<line x1="48.0" y1="135.5" x2="272.0" y2="135.5" stroke="#f0b90b" stroke-width="1.1" stroke-dasharray="4 3"/>
<path d="M48.0,173.0 L92.8,131.0 L137.6,137.0 L182.4,128.0 L227.2,134.0 L272.0,125.0" stroke="#089981" stroke-width="2.4" fill="none"/>
<text x="48.0" y="206.0" fill="#787b86" font-size="10">Opens above value. OR forms high; watch</text>
<text x="48.0" y="219.0" fill="#787b86" font-size="10">for gap-fill pullback then OR-high</text>
<text x="48.0" y="232.0" fill="#787b86" font-size="10">break, or fade exhaustion.</text>
<rect x="304.0" y="82.0" width="252.0" height="210.0" rx="8" fill="#161d2b" stroke="#f23645" stroke-width="1.4"/>
<text x="318.0" y="106.0" fill="#f23645" font-size="14" font-weight="700">GAP-DOWN</text>
<line x1="318.0" y1="162.5" x2="542.0" y2="162.5" stroke="#f0b90b" stroke-width="1.1" stroke-dasharray="4 3"/>
<path d="M318.0,125.0 L362.8,167.0 L407.6,161.0 L452.4,170.0 L497.2,164.0 L542.0,173.0" stroke="#f23645" stroke-width="2.4" fill="none"/>
<text x="318.0" y="206.0" fill="#787b86" font-size="10">Opens below value. OR forms low; sell</text>
<text x="318.0" y="219.0" fill="#787b86" font-size="10">failed OR-high reclaims, or buy a sweep</text>
<text x="318.0" y="232.0" fill="#787b86" font-size="10">of the OR low.</text>
<rect x="574.0" y="82.0" width="252.0" height="210.0" rx="8" fill="#161d2b" stroke="#26c6da" stroke-width="1.4"/>
<text x="588.0" y="106.0" fill="#26c6da" font-size="14" font-weight="700">FLAT</text>
<line x1="588.0" y1="154.2" x2="812.0" y2="154.2" stroke="#f0b90b" stroke-width="1.1" stroke-dasharray="4 3"/>
<path d="M588.0,154.2 L632.8,147.3 L677.6,161.2 L722.4,143.8 L767.2,157.7 L812.0,136.8" stroke="#26c6da" stroke-width="2.4" fill="none"/>
<text x="588.0" y="206.0" fill="#787b86" font-size="10">Opens in value. OR is the cleanest read;</text>
<text x="588.0" y="219.0" fill="#787b86" font-size="10">trade the OR edges, not the middle. Best</text>
<text x="588.0" y="232.0" fill="#787b86" font-size="10">ORB setup.</text>
<text x="430.0" y="388" fill="#787b86" font-size="11.5" text-anchor="middle">The open type tells you whether to expect a gap-fill, a fade, or a clean OR-edge break.</text>
</svg>