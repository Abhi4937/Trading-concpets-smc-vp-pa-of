<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 420" font-family="Segoe UI,Arial,sans-serif">
<rect width="860" height="420" rx="12" fill="#131722"/>
<text x="26" y="30" fill="#d1d4dc" font-size="19" font-weight="700">Dalton's Four Open Types</text>
<text x="26" y="49" fill="#787b86" font-size="12.5">How the auction opens tells you the day's conviction — and whether to trust the OR break</text>
<rect x="26.0" y="80.0" width="191.5" height="270.0" rx="8" fill="#161d2b" stroke="#089981" stroke-width="1.4"/>
<text x="121.8" y="102.0" fill="#089981" font-size="11.5" font-weight="700" text-anchor="middle">OPEN-DRIVE</text>
<line x1="38.0" y1="163.3" x2="205.5" y2="163.3" stroke="#f0b90b" stroke-width="1.1" stroke-dasharray="4 3"/>
<path d="M38.0,176.2 L71.5,165.9 L105.0,154.2 L138.5,142.5 L172.0,132.1 L205.5,121.8" stroke="#089981" stroke-width="2.4" fill="none"/>
<text x="38.0" y="202.0" fill="#787b86" font-size="9.5">Opens and drives one way</text>
<text x="38.0" y="214.0" fill="#787b86" font-size="9.5">with no look back.</text>
<text x="38.0" y="226.0" fill="#787b86" font-size="9.5">Highest conviction —</text>
<text x="38.0" y="238.0" fill="#787b86" font-size="9.5">trade the break, do not</text>
<text x="38.0" y="250.0" fill="#787b86" font-size="9.5">fade.</text>
<rect x="231.5" y="80.0" width="191.5" height="270.0" rx="8" fill="#161d2b" stroke="#26c6da" stroke-width="1.4"/>
<text x="327.2" y="102.0" fill="#26c6da" font-size="11.5" font-weight="700" text-anchor="middle">OPEN-TEST-DRIVE</text>
<line x1="243.5" y1="162.7" x2="411.0" y2="162.7" stroke="#f0b90b" stroke-width="1.1" stroke-dasharray="4 3"/>
<path d="M243.5,162.7 L277.0,174.9 L310.5,168.8 L344.0,155.1 L377.5,138.3 L411.0,123.1" stroke="#26c6da" stroke-width="2.4" fill="none"/>
<text x="243.5" y="202.0" fill="#787b86" font-size="9.5">Tests the opposite side</text>
<text x="243.5" y="214.0" fill="#787b86" font-size="9.5">first (a sweep), then</text>
<text x="243.5" y="226.0" fill="#787b86" font-size="9.5">drives. Enter on the</text>
<text x="243.5" y="238.0" fill="#787b86" font-size="9.5">reclaim after the test.</text>
<rect x="437.0" y="80.0" width="191.5" height="270.0" rx="8" fill="#161d2b" stroke="#f0b90b" stroke-width="1.4"/>
<text x="532.8" y="102.0" fill="#f0b90b" font-size="11.5" font-weight="700" text-anchor="middle">OPEN-REJECTION-REVERSE</text>
<line x1="449.0" y1="152.2" x2="616.5" y2="152.2" stroke="#f0b90b" stroke-width="1.1" stroke-dasharray="4 3"/>
<path d="M449.0,152.2 L482.5,133.1 L516.0,123.5 L549.5,144.2 L583.0,161.7 L616.5,174.5" stroke="#f0b90b" stroke-width="2.4" fill="none"/>
<text x="449.0" y="202.0" fill="#787b86" font-size="9.5">Pushes one way, gets</text>
<text x="449.0" y="214.0" fill="#787b86" font-size="9.5">rejected, reverses hard.</text>
<text x="449.0" y="226.0" fill="#787b86" font-size="9.5">The classic ORB trap —</text>
<text x="449.0" y="238.0" fill="#787b86" font-size="9.5">fade the failed extreme.</text>
<rect x="642.5" y="80.0" width="191.5" height="270.0" rx="8" fill="#161d2b" stroke="#9c27b0" stroke-width="1.4"/>
<text x="738.2" y="102.0" fill="#9c27b0" font-size="11.5" font-weight="700" text-anchor="middle">OPEN-AUCTION</text>
<line x1="654.5" y1="152.2" x2="822.0" y2="152.2" stroke="#f0b90b" stroke-width="1.1" stroke-dasharray="4 3"/>
<path d="M654.5,152.2 L688.0,133.1 L721.5,164.9 L755.0,139.5 L788.5,158.5 L822.0,145.8" stroke="#9c27b0" stroke-width="2.4" fill="none"/>
<text x="654.5" y="202.0" fill="#787b86" font-size="9.5">Balances in a range, no</text>
<text x="654.5" y="214.0" fill="#787b86" font-size="9.5">conviction.</text>
<text x="654.5" y="226.0" fill="#787b86" font-size="9.5">Lowest-quality ORB —</text>
<text x="654.5" y="238.0" fill="#787b86" font-size="9.5">wait for a clean edge or</text>
<text x="654.5" y="250.0" fill="#787b86" font-size="9.5">stand aside.</text>
<text x="430.0" y="408" fill="#787b86" font-size="11.5" text-anchor="middle">Conviction ladder: drive &gt; test-drive &gt; rejection-reverse &gt; auction. The opening type rates the break.</text>
</svg>