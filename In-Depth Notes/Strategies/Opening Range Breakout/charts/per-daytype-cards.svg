<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 420" font-family="Segoe UI,Arial,sans-serif">
<rect width="860" height="420" rx="12" fill="#131722"/>
<text x="26" y="30" fill="#d1d4dc" font-size="19" font-weight="700">ORB Per Day-Type — three playbooks</text>
<text x="26" y="49" fill="#787b86" font-size="12.5">Trend-day · balance-day · gap-day each demand a different ORB approach</text>
<rect x="26.0" y="86.0" width="256.0" height="270.0" rx="8" fill="#161d2b" stroke="#089981" stroke-width="1.4"/>
<rect x="26.0" y="86.0" width="256.0" height="34" rx="8" fill="#089981" opacity="0.20"/>
<text x="154.0" y="109.0" fill="#089981" font-size="14" font-weight="700" text-anchor="middle">TREND DAY</text>
<text x="154.0" y="144.0" fill="#d1d4dc" font-size="12.5" font-weight="700" text-anchor="middle">→ trade the break</text>
<text x="40.0" y="172.0" fill="#787b86" font-size="10.5">Open-drive / neg-GEX. OR break</text>
<text x="40.0" y="185.5" fill="#787b86" font-size="10.5">extends. Enter the conviction</text>
<text x="40.0" y="199.0" fill="#787b86" font-size="10.5">close or first retest; target</text>
<text x="40.0" y="212.5" fill="#787b86" font-size="10.5">the measured move + next</text>
<text x="40.0" y="226.0" fill="#787b86" font-size="10.5">level. Trail the runner.</text>
<rect x="302.0" y="86.0" width="256.0" height="270.0" rx="8" fill="#161d2b" stroke="#f0b90b" stroke-width="1.4"/>
<rect x="302.0" y="86.0" width="256.0" height="34" rx="8" fill="#f0b90b" opacity="0.20"/>
<text x="430.0" y="109.0" fill="#f0b90b" font-size="14" font-weight="700" text-anchor="middle">BALANCE DAY</text>
<text x="430.0" y="144.0" fill="#d1d4dc" font-size="12.5" font-weight="700" text-anchor="middle">→ trade the trap (fade)</text>
<text x="316.0" y="172.0" fill="#787b86" font-size="10.5">Range / pos-GEX / pin. OR</text>
<text x="316.0" y="185.5" fill="#787b86" font-size="10.5">breaks fail. Fade the poke</text>
<text x="316.0" y="199.0" fill="#787b86" font-size="10.5">back inside the OR; target the</text>
<text x="316.0" y="212.5" fill="#787b86" font-size="10.5">opposite OR edge / POC. Quick</text>
<text x="316.0" y="226.0" fill="#787b86" font-size="10.5">exits.</text>
<rect x="578.0" y="86.0" width="256.0" height="270.0" rx="8" fill="#161d2b" stroke="#26c6da" stroke-width="1.4"/>
<rect x="578.0" y="86.0" width="256.0" height="34" rx="8" fill="#26c6da" opacity="0.20"/>
<text x="706.0" y="109.0" fill="#26c6da" font-size="14" font-weight="700" text-anchor="middle">GAP DAY</text>
<text x="706.0" y="144.0" fill="#d1d4dc" font-size="12.5" font-weight="700" text-anchor="middle">→ let it settle</text>
<text x="592.0" y="172.0" fill="#787b86" font-size="10.5">Gap-up / gap-down. Skip the</text>
<text x="592.0" y="185.5" fill="#787b86" font-size="10.5">first OR candle; wait for the</text>
<text x="592.0" y="199.0" fill="#787b86" font-size="10.5">gap-fill or held retest, then</text>
<text x="592.0" y="212.5" fill="#787b86" font-size="10.5">trade the OR-edge break with</text>
<text x="592.0" y="226.0" fill="#787b86" font-size="10.5">the gap.</text>
<text x="430.0" y="408" fill="#787b86" font-size="11.5" text-anchor="middle">Same opening range, three different days — read the day-type first, then pick the playbook.</text>
</svg>