<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 480" font-family="Segoe UI,Arial,sans-serif">
<rect width="860" height="480" rx="12" fill="#131722"/>
<text x="26" y="30" fill="#d1d4dc" font-size="19" font-weight="700">ORB Confluence Scorecard — A+ / A / skip</text>
<text x="26" y="49" fill="#787b86" font-size="12.5">Count the confluences; the grade decides size (and whether to trade at all)</text>
<circle cx="36" cy="92" r="6" fill="none" stroke="#787b86" stroke-width="1.5"/>
<text x="54" y="96" fill="#d1d4dc" font-size="12.5">Regime aligns (trend / neg-GEX) with break direction</text>
<circle cx="36" cy="126" r="6" fill="none" stroke="#787b86" stroke-width="1.5"/>
<text x="54" y="130" fill="#d1d4dc" font-size="12.5">Break on the right side of VWAP</text>
<circle cx="36" cy="160" r="6" fill="none" stroke="#787b86" stroke-width="1.5"/>
<text x="54" y="164" fill="#d1d4dc" font-size="12.5">Volume EXPANSION on the break candle</text>
<circle cx="36" cy="194" r="6" fill="none" stroke="#787b86" stroke-width="1.5"/>
<text x="54" y="198" fill="#d1d4dc" font-size="12.5">Fresh OI buildup in the break direction</text>
<circle cx="36" cy="228" r="6" fill="none" stroke="#787b86" stroke-width="1.5"/>
<text x="54" y="232" fill="#d1d4dc" font-size="12.5">Price breaking AWAY from max-pain</text>
<circle cx="36" cy="262" r="6" fill="none" stroke="#787b86" stroke-width="1.5"/>
<text x="54" y="266" fill="#d1d4dc" font-size="12.5">Clean retest of the OR edge holds</text>
<circle cx="36" cy="296" r="6" fill="none" stroke="#787b86" stroke-width="1.5"/>
<text x="54" y="300" fill="#d1d4dc" font-size="12.5">R:R to first target ≥ 2:1</text>
<circle cx="36" cy="330" r="6" fill="none" stroke="#787b86" stroke-width="1.5"/>
<text x="54" y="334" fill="#d1d4dc" font-size="12.5">Not late on an expiry day (theta-hostile)</text>
<rect x="560.0" y="112.0" width="274.0" height="58.0" rx="8" fill="#1a2230" stroke="#089981" stroke-width="1.4"/>
<text x="574.0" y="136.0" fill="#089981" font-size="14" font-weight="700">A+ break</text>
<text x="574.0" y="156.0" fill="#d1d4dc" font-size="11">≥ 7 / 8 — full size</text>
<rect x="560.0" y="186.0" width="274.0" height="58.0" rx="8" fill="#1a2230" stroke="#26c6da" stroke-width="1.4"/>
<text x="574.0" y="210.0" fill="#26c6da" font-size="14" font-weight="700">A break</text>
<text x="574.0" y="230.0" fill="#d1d4dc" font-size="11">5–6 / 8 — ½–¾ size</text>
<rect x="560.0" y="260.0" width="274.0" height="58.0" rx="8" fill="#1a2230" stroke="#f23645" stroke-width="1.4"/>
<text x="574.0" y="284.0" fill="#f23645" font-size="14" font-weight="700">skip</text>
<text x="574.0" y="304.0" fill="#d1d4dc" font-size="11">≤ 4 / 8 — no trade / paper</text>
<text x="430.0" y="468" fill="#787b86" font-size="11.5" text-anchor="middle">The grade sets the SIZE. Only A+ gets full risk; A gets reduced; anything less waits.</text>
</svg>