<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 460" font-family="Segoe UI,Arial,sans-serif">
<rect width="860" height="460" rx="12" fill="#131722"/>
<text x="26" y="30" fill="#d1d4dc" font-size="19" font-weight="700">The Honest Edge — naive ORB option-buying is not a strategy</text>
<text x="26" y="49" fill="#787b86" font-size="12.5">Illustrative single-source backtest (Zerodha): naive ORB on Nifty options</text>
<rect x="26.0" y="90.0" width="389.0" height="210.0" rx="8" fill="#161d2b" stroke="#f23645" stroke-width="1.4"/>
<text x="42.0" y="118.0" fill="#f23645" font-size="13.5" font-weight="700">Naive ORB — option BUYING</text>
<text x="42.0" y="168.0" fill="#d1d4dc" font-size="22" font-weight="800">~48%</text>
<text x="42.0" y="192.0" fill="#787b86" font-size="10.5">win rate</text>
<text x="232.5" y="168.0" fill="#d1d4dc" font-size="22" font-weight="800">~45%</text>
<text x="232.5" y="192.0" fill="#787b86" font-size="10.5">max drawdown</text>
<text x="42.0" y="240.0" fill="#787b86" font-size="10.5">Premium decay + false breaks eat the wins. A</text>
<text x="42.0" y="253.5" fill="#787b86" font-size="10.5">coin-flip with a brutal drawdown.</text>
<rect x="445.0" y="90.0" width="389.0" height="210.0" rx="8" fill="#161d2b" stroke="#f0b90b" stroke-width="1.4"/>
<text x="461.0" y="118.0" fill="#f0b90b" font-size="13.5" font-weight="700">Naive ORB — option SELLING</text>
<text x="461.0" y="168.0" fill="#d1d4dc" font-size="22" font-weight="800">marginally</text>
<text x="461.0" y="190.0" fill="#d1d4dc" font-size="22" font-weight="800">better</text>
<text x="461.0" y="214.0" fill="#787b86" font-size="10.5">win rate</text>
<text x="651.5" y="168.0" fill="#d1d4dc" font-size="22" font-weight="800">~6%</text>
<text x="651.5" y="192.0" fill="#787b86" font-size="10.5">max drawdown</text>
<text x="461.0" y="240.0" fill="#787b86" font-size="10.5">Theta works for you, so drawdown is far</text>
<text x="461.0" y="253.5" fill="#787b86" font-size="10.5">smaller — but it is still not an edge by</text>
<text x="461.0" y="267.0" fill="#787b86" font-size="10.5">itself.</text>
<rect x="26.0" y="318.0" width="808.0" height="52.0" rx="8" fill="#1d2330" stroke="#f0b90b" stroke-width="1.4"/>
<text x="430.0" y="340.0" fill="#f0b90b" font-size="14" font-weight="700" text-anchor="middle">The edge is SELECTIVITY, not the break.</text>
<text x="430.0" y="360.0" fill="#d1d4dc" font-size="11.5" text-anchor="middle">Profits come from the confluence filters (regime, VWAP, volume, OI, R:R) — not from buying every OR break.</text>
<text x="430.0" y="450" fill="#787b86" font-size="10.5" text-anchor="middle">Numbers are illustrative, from a single Zerodha backtest — directional, not a guarantee.</text>
</svg>