<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 440" font-family="Segoe UI,Arial,sans-serif">
<rect width="860" height="440" rx="12" fill="#131722"/>
<text x="26" y="30" fill="#d1d4dc" font-size="19" font-weight="700">Opening-Range Window — which timeframe?</text>
<text x="26" y="49" fill="#787b86" font-size="12.5">5 / 15 / 30 / 60-min OR windows — speed vs reliability tradeoff</text>
<rect x="36.0" y="86.0" width="788.0" height="40" rx="6" fill="#1d2330"/>
<text x="48.0" y="112.0" fill="#26c6da" font-size="12" font-weight="700">Window</text>
<text x="237.1" y="112.0" fill="#26c6da" font-size="12" font-weight="700">Signals</text>
<text x="426.2" y="112.0" fill="#26c6da" font-size="12" font-weight="700">False breaks</text>
<text x="568.1" y="112.0" fill="#26c6da" font-size="12" font-weight="700">Best for</text>
<rect x="36.0" y="126.0" width="788.0" height="58.0" fill="#161d2b"/>
<rect x="36.0" y="126.0" width="6" height="58.0" rx="3" fill="#f0b90b"/>
<text x="52.0" y="160.0" fill="#f0b90b" font-size="11.5" font-weight="700">5-min OR</text>
<text x="237.1" y="160.0" fill="#d1d4dc" font-size="11.5" font-weight="500">fast, frequent</text>
<text x="426.2" y="160.0" fill="#f23645" font-size="11.5" font-weight="500">HIGH</text>
<text x="568.1" y="160.0" fill="#d1d4dc" font-size="11.5" font-weight="500">scalpers; needs tight filters</text>
<rect x="36.0" y="184.0" width="788.0" height="58.0" fill="#11161f"/>
<rect x="36.0" y="184.0" width="6" height="58.0" rx="3" fill="#089981"/>
<text x="52.0" y="218.0" fill="#089981" font-size="11.5" font-weight="700">15-min OR</text>
<text x="237.1" y="218.0" fill="#d1d4dc" font-size="11.5" font-weight="500">balanced (default)</text>
<text x="426.2" y="218.0" fill="#d1d4dc" font-size="11.5" font-weight="500">moderate</text>
<text x="568.1" y="218.0" fill="#d1d4dc" font-size="11.5" font-weight="500">the standard intraday choice</text>
<rect x="36.0" y="242.0" width="788.0" height="58.0" fill="#161d2b"/>
<rect x="36.0" y="242.0" width="6" height="58.0" rx="3" fill="#26c6da"/>
<text x="52.0" y="276.0" fill="#26c6da" font-size="11.5" font-weight="700">30-min OR</text>
<text x="237.1" y="276.0" fill="#d1d4dc" font-size="11.5" font-weight="500">fewer, cleaner</text>
<text x="426.2" y="276.0" fill="#d1d4dc" font-size="11.5" font-weight="500">low</text>
<text x="568.1" y="276.0" fill="#d1d4dc" font-size="11.5" font-weight="500">positional intraday / swing-style</text>
<rect x="36.0" y="300.0" width="788.0" height="58.0" fill="#11161f"/>
<rect x="36.0" y="300.0" width="6" height="58.0" rx="3" fill="#2962ff"/>
<text x="52.0" y="334.0" fill="#2962ff" font-size="11.5" font-weight="700">60-min / 9:15–11:15</text>
<text x="237.1" y="334.0" fill="#d1d4dc" font-size="11.5" font-weight="500">rare, high-quality</text>
<text x="426.2" y="334.0" fill="#d1d4dc" font-size="11.5" font-weight="500">lowest</text>
<text x="568.1" y="334.0" fill="#d1d4dc" font-size="11.5" font-weight="500">slow trend-day continuation</text>
<rect x="36.0" y="126" width="788.0" height="232.0" rx="6" fill="none" stroke="#1b2230" stroke-width="1.2"/>
<text x="430.0" y="428" fill="#f0b90b" font-size="11.5" font-weight="600" text-anchor="middle">Default to the 15-min OR; widen the window when you want fewer, cleaner signals.</text>
</svg>